// ── GLOBAL CR ────────────────────────────────────────────────────────────────
let globalCR = 0;       // valor aplicado (el que usa getEffectiveCT)
let globalCRInput = 0;  // valor del input (no aplicado hasta CR ON)
let globalCRActive = false;

function getEffectiveCT(refData) {
  if (globalCRActive && globalCR > 0) return globalCR;
  return refData ? refData.ct : 0;
}

function getBaseCT() {
  // Get the base CT (without CR) for active refs
  for (const side of ['C1','C2']) {
    const rd = getLayoutRefData(side);
    if (rd && rd.ct) return rd.ct;
  }
  return 0;
}

function adjustSwapMsForRateChange(oldRate, newRate) {
  if (!oldRate || !newRate || Math.abs(oldRate - newRate) < 0.001) return;
  ['C1','C2'].forEach(side => {
    const ls = layoutState[side];
    if (!ls.startMs) return;
    const rd = getLayoutRefData(side);
    if (!rd || !rd.pzs) return;
    const currentElapsed = getElapsedMs(side);
    LAYOUT_ROBOTS[side].forEach((robot, ri) => {
      const curSlot = ls.robotPhase[ri];
      const preloaded = Math.max(0, ls.preloaded[ri][curSlot] || 0);
      const effPzs = Math.max(1, rd.pzs - preloaded);
      const fillElapsed = currentElapsed - ls.robotFillStartMs[ri];
      const fracFilled = Math.min(1, Math.max(0, fillElapsed / (effPzs * oldRate * 1000)));
      ls.robotFillStartMs[ri] = currentElapsed - (fracFilled * effPzs * newRate * 1000);
    });
  });
}


function toggleGlobalCR() {
  if (!globalCRActive) {
    // Activar: usar globalCRInput (valor del input)
    const val = globalCRInput || globalCR || 0;
    if (!val) { const inp=document.getElementById('la-cr-C1'); if(inp) inp.focus(); return; }
    snapshotAutoProduced();
    ['C1','C2'].forEach(side => adjustSwapMsForRateChange(getEffectiveCT(getLayoutRefData(side)), val));
    globalCR = val;
    globalCRInput = val;
    globalCRActive = true;
  } else {
    // Desactivar: volver al CT base
    snapshotAutoProduced();
    const oldRate = globalCR;
    ['C1','C2'].forEach(side => adjustSwapMsForRateChange(oldRate, getEffectiveCT(getLayoutRefData(side))));
    globalCRActive = false;
    // Mantener globalCRInput con el valor actual del input para no perderlo
  }
  for (let i = 0; i < NUM_ROWS; i++) updateRow(i);
  renderLineaLayout();
}
// Alias used by calc row button
const toggleCR = toggleGlobalCR;

// ── LAYOUT STATE ──────────────────────────────────────────────────────────────
// Physical layout:
// C1 (Carrista 1, top):    [1A][1B][R1][3A][3B][R3][5A][5B]
// C2 (Carrista 2, bottom): [2A][2B][R2][4A][4B][R4][6A][6B]
// R1→fills 1B,3A  R3→fills 3B,5A  R2→fills 2B,4A  R4→fills 4B,6A
const LAYOUT_ROBOTS = {
  C1: [
    { id:'R1', pallets:['1B','3A'] }, // R1: 1B first (outer-left), then 3A (inner-right)
    { id:'R3', pallets:['5A','3B'] }  // R3: 5A first (outer-right), then 3B (inner-left)
  ],
  C2: [
    { id:'R2', pallets:['2B','4A'] }, // R2: 2B first (outer-left), then 4A (inner-right)
    { id:'R4', pallets:['6A','4B'] }  // R4: 6A first (outer-right), then 4B (inner-left)
  ]
};
const LAYOUT_ALL_PALLETS = {
  C1: ['1A','1B','R1','3A','3B','R3','5A','5B'],
  C2: ['2A','2B','R2','4A','4B','R4','6A','6B']
};
// Pallets NOT filled by robots (buffer/storage)
const LAYOUT_BUFFER = { C1:['1A','5B'], C2:['2A','6B'] };
// Pallet → robot mapping: which robot fills which pallet
const PALLET_ROBOT = { '1B':'R1','3A':'R1','3B':'R3','5A':'R3','2B':'R2','4A':'R2','4B':'R4','6A':'R4' };
// Pallet → slot within robot (0=first to fill/outer, 1=second to fill/inner)
// C1: R1→[1B=outer, 3A=inner], R3→[5A=outer, 3B=inner]
// C2: R2→[2B=outer, 4A=inner], R4→[6A=outer, 4B=inner]
const PALLET_SLOT = { '1B':0,'3A':1,'5A':0,'3B':1,'2B':0,'4A':1,'6A':0,'4B':1 };

let layoutState = {
  C1: { running:false, startMs:null, pauseMs:null, totalPausedMs:0,
        retiredCount:0, incompleteCount:0, incompletePzs:0,
        swapMs:[[null,null],[null,null]], preloaded:[[0,0],[0,0]],
        robotPhase:[0,0], robotFillStartMs:[0,0], lastFillEndMs:[[null,null],[null,null]],
        alado:0 },
  C2: { running:false, startMs:null, pauseMs:null, totalPausedMs:0,
        retiredCount:0, incompleteCount:0, incompletePzs:0,
        swapMs:[[null,null],[null,null]], preloaded:[[0,0],[0,0]],
        robotPhase:[0,0], robotFillStartMs:[0,0], lastFillEndMs:[[null,null],[null,null]],
        alado:0 }
};
let layoutTimer = null;

// ── GLOBAL CALCULATOR STATE ───────────────────────────────────────────────────
let layoutCalcDemanda = 0;
let layoutCalcActuales = 0; // user-input base value
let layoutCalcAutoProduced = 0; // pieces produced automatically (locked in at each rate change)
let layoutCalcAutoRefElapsedMs = 0; // elapsed ms at last rate snapshot

function getMaxLayoutElapsed() {
  let max = 0;
  for (const side of ['C1','C2']) {
    if (layoutState[side].startMs) max = Math.max(max, getElapsedMs(side));
  }
  return max;
}

function getCurrentEffectiveCT() {
  for (const side of ['C1','C2']) {
    const rd = getLayoutRefData(side);
    if (rd) return getEffectiveCT(rd);
  }
  return 0;
}

function countActiveSides() {
  // How many sides have an active ref in the layout
  let count = 0;
  for (const side of ['C1','C2']) { if (getLayoutRefData(side)) count++; }
  return Math.max(1, count);
}

function snapshotAutoProduced() {
  const elapsed = getMaxLayoutElapsed();
  const ct = getCurrentEffectiveCT();
  const n = countActiveSides(); // production rate multiplier
  if (ct > 0 && elapsed > layoutCalcAutoRefElapsedMs) {
    layoutCalcAutoProduced += Math.max(0, Math.floor((elapsed - layoutCalcAutoRefElapsedMs) * n / (ct * 1000)));
    layoutCalcAutoRefElapsedMs = elapsed;
  }
}

function getLiveActuales() {
  const elapsed = getMaxLayoutElapsed();
  const ct = getCurrentEffectiveCT();
  const n = countActiveSides(); // both sides produce simultaneously → 2× rate
  const currentPeriod = (ct > 0 && elapsed > layoutCalcAutoRefElapsedMs)
    ? Math.max(0, Math.floor((elapsed - layoutCalcAutoRefElapsedMs) * n / (ct * 1000)))
    : 0;
  return layoutCalcActuales + layoutCalcAutoProduced + currentPeriod;
}


function setLayoutActuales(val) {
  // User sets actuales directly: update base and reset auto-tracking from now
  snapshotAutoProduced();
  const currentLive = getLiveActuales();
  // Set so that live total = val: base = val, reset auto-produced and ref
  layoutCalcActuales = Math.max(0, val);
  layoutCalcAutoProduced = 0;
  layoutCalcAutoRefElapsedMs = getMaxLayoutElapsed();
  updateLayoutStats();
}

// ── LAYOUT RENDERING ─────────────────────────────────────────────────────────

function getElapsedMs(side) {
  const ls = layoutState[side];
  if (!ls.startMs) return 0;
  const now = ls.pauseMs ? ls.pauseMs : Date.now();
  return now - ls.startMs - ls.totalPausedMs;
}

function getPalletState(side, robotIdx, slotIdx) {
  const ls = layoutState[side];
  // Check robot selection
  const rowRef = rows.find(r => r.layoutActive && (r.sides||[]).includes(side));
  const sel = rowRef ? (rowRef.selectedRobots || []) : [];
  if (sel.length > 0) {
    const robot = LAYOUT_ROBOTS[side][robotIdx];
    if (robot && !sel.includes(robot.id)) return { pct:0, msLeft:null, status:'inactive', preloaded:0, tFullMs:null };
  }
  const rd = getLayoutRefData(side);
  if (!rd || !rd.pzs) return { pct:0, msLeft:null, status:'waiting', preloaded:0, tFullMs:null };
  const ct = getEffectiveCT(rd);
  if (!ct) return { pct:0, msLeft:null, status:'waiting', preloaded:0, tFullMs:null };
  const preloaded = Math.max(0, ls.preloaded[robotIdx][slotIdx] || 0);
  const effPzs = Math.max(1, rd.pzs - preloaded);
  const tFullMs = effPzs * ct * 1000;
  const swapMs_si = ls.swapMs[robotIdx][slotIdx];
  if (swapMs_si === null) return { pct: Math.round(preloaded/rd.pzs*100), msLeft:tFullMs, status:'waiting', preloaded, tFullMs };
  const robotIsHere = ls.robotPhase[robotIdx] === slotIdx;
  if (!robotIsHere) {
    const lastEnd = ls.lastFillEndMs[robotIdx][slotIdx];
    // If pallet was placed before/at the time robot last filled this slot → still the full pallet
    if (lastEnd !== null && swapMs_si <= lastEnd) return { pct:100, msLeft:0, status:'full', preloaded, tFullMs };
    // Fresh pallet waiting for robot
    return { pct: Math.round(preloaded/rd.pzs*100), msLeft:tFullMs, status:'waiting', preloaded, tFullMs };
  }
  // Robot is here filling
  const fillElapsed = Math.max(0, getElapsedMs(side) - ls.robotFillStartMs[robotIdx]);
  const pzsFilled = preloaded + fillElapsed / (ct * 1000);
  const pct = Math.min(100, Math.max(0, pzsFilled / rd.pzs * 100));
  const msLeft = Math.max(0, tFullMs - fillElapsed);
  const isFull = fillElapsed >= tFullMs;
  const status = isFull ? 'full' : (ls.running ? 'filling' : (ls.startMs ? 'paused' : 'waiting'));
  return { pct:Math.round(pct), msLeft, status, preloaded, tFullMs };
}

function swapLayoutPallet(side, robotIdx, slotIdx) {
  const ls = layoutState[side];
  const elapsed = getElapsedMs(side);
  // +1ms ensures swapMs > lastFillEndMs even when elapsed is frozen during pause
  ls.swapMs[robotIdx][slotIdx] = elapsed + 1;
  ls.lastFillEndMs[robotIdx][slotIdx] = elapsed;
  ls.retiredCount++;
  ls.alado = Math.max(0, (ls.alado||0) - 1);
  // If robot is currently at this slot, reset its fill start for the fresh pallet
  if (ls.robotPhase[robotIdx] === slotIdx) {
    ls.robotFillStartMs[robotIdx] = elapsed + 1;
  }
  layoutStructureHash = ''; // force rebuild to clear full state visually
  renderLineaLayout();
}

function retireLayoutPallet(side, robotIdx, slotIdx) {
  const ls = layoutState[side];
  const rd = getLayoutRefData(side);
  const s = getPalletState(side, robotIdx, slotIdx);
  const pzsFilled = rd ? Math.round(s.pct / 100 * rd.pzs) : 0;
  ls.incompleteCount++;
  ls.incompletePzs += pzsFilled;
  ls.alado = Math.max(0, (ls.alado||0) - 1);
  const elapsed = getElapsedMs(side);

  // Place fresh pallet at the retired position
  ls.swapMs[robotIdx][slotIdx] = elapsed + 1; // +1ms over lastFillEnd to ensure fresh detection
  ls.lastFillEndMs[robotIdx][slotIdx] = elapsed; // lastFillEnd = elapsed, swapMs = elapsed+1 → always fresh

  if (ls.robotPhase[robotIdx] === slotIdx) {
    // Robot is currently here — reset fill start for the fresh pallet placed here
    const otherSlot = 1 - slotIdx;
    const otherSwapMs = ls.swapMs[robotIdx][otherSlot];
    const otherLastEnd = ls.lastFillEndMs[robotIdx][otherSlot];
    const otherHasFreshPallet = otherSwapMs !== null &&
      (otherLastEnd === null || otherSwapMs > otherLastEnd);

    if (otherHasFreshPallet && ls.running) {
      // Running: move robot to other slot
      ls.robotPhase[robotIdx] = otherSlot;
      ls.robotFillStartMs[robotIdx] = elapsed + 1;
    } else {
      // Paused or no other fresh pallet: reset fill start here for the new pallet
      ls.robotFillStartMs[robotIdx] = elapsed + 1;
    }
  }
  layoutStructureHash = '';
  renderLineaLayout();
}

function setPreloaded(side, robotIdx, slotIdx, val) {
  layoutState[side].preloaded[robotIdx][slotIdx] = Math.max(0, val || 0);
  renderLineaLayout();
}

function adjustPalletPieces(side, robotIdx, slotIdx, newPieces) {
  const ls = layoutState[side];
  const rd = getLayoutRefData(side);
  if (!rd || !rd.pzs || !ls.startMs) return;
  const ct = getEffectiveCT(rd);
  if (!ct) return;
  const preloaded = Math.max(0, ls.preloaded[robotIdx][slotIdx] || 0);
  const clamped = Math.max(preloaded, Math.min(rd.pzs, newPieces || preloaded));
  // Adjust robotFillStartMs so fill elapsed matches the new piece count
  const additionalElapsed = (clamped - preloaded) * ct * 1000;
  ls.robotFillStartMs[robotIdx] = getElapsedMs(side) - additionalElapsed;
  renderLineaLayout();
}

function swapRobotPallets(side, robotIdx) {
  const elapsed = getElapsedMs(side);
  const ls = layoutState[side];
  ls.swapMs[robotIdx][0] = elapsed;
  ls.swapMs[robotIdx][1] = elapsed;
  ls.robotPhase[robotIdx] = 0;
  ls.robotFillStartMs[robotIdx] = elapsed;
  ls.lastFillEndMs[robotIdx] = [null, null];
  ls.retiredCount += 2;
  ls.alado = Math.max(0, (ls.alado||0) - 2);
  renderLineaLayout();
}

function retireSidePallets(side) {
  // Retire ALL full pallets on this side in one tap
  const ls = layoutState[side];
  const elapsed = getElapsedMs(side);
  let retired = 0;
  LAYOUT_ROBOTS[side].forEach((robot, ri) => {
    for (let si = 0; si < 2; si++) {
      const s = getPalletState(side, ri, si);
      if (s.status === 'full') {
        ls.swapMs[ri][si] = elapsed + 1;
        ls.lastFillEndMs[ri][si] = elapsed;
        ls.retiredCount++;
        retired++;
        ls.alado = Math.max(0, (ls.alado||0) - 1);
        // If robot is at this slot, reset fill start time for fresh pallet
        if (ls.robotPhase[ri] === si) {
          ls.robotFillStartMs[ri] = elapsed + 1;
        }
      }
    }
  });
  if (retired > 0) layoutStructureHash = ''; // force rebuild
  renderLineaLayout();
}

function toggleSideLayout(side) {
  const ls = layoutState[side];
  if (ls.running) {
    snapshotAutoProduced(); // congela piezas producidas hasta ahora antes de pausar
    ls.running = false;
    ls.pauseMs = Date.now();
  } else {
    if (!ls.startMs) {
      ls.startMs = Date.now();
      ls.totalPausedMs = 0;
      ls.pauseMs = null;
      ls.swapMs = [[0, 0], [0, 0]]; // both slots have pallets from start
      ls.robotPhase = [0, 0];
      ls.robotFillStartMs = [0, 0];
      ls.lastFillEndMs = [[null,null],[null,null]];
    } else {
      if (ls.pauseMs) {
        ls.totalPausedMs += Date.now() - ls.pauseMs;
        ls.pauseMs = null;
      }
      snapshotAutoProduced(); // actualiza referencia al reanudar para evitar doble conteo
    }
    ls.running = true;
    // Restart global timer (may have been killed by auto-pause line stop)
    if (!layoutTimer) layoutTimer = setInterval(() => {
      checkLayoutTransitions();
      renderLineaLayout();
      updateLayoutStats();
    }, 1000);
  }
  renderLineaLayout();
}

function toggleGlobalLayout() {
  const anyRunning = layoutState.C1.running || layoutState.C2.running;
  const anyStarted = layoutState.C1.startMs || layoutState.C2.startMs;
  if (anyRunning) {
    // Pause all
    ['C1','C2'].forEach(s => { if(layoutState[s].running) toggleSideLayout(s); });
  } else {
    // Start or resume all sides that have active refs
    ['C1','C2'].forEach(s => {
      if (getLayoutRefData(s)) toggleSideLayout(s);
    });
  }
  updateGlobalLayoutBtn();
}

function updateGlobalLayoutBtn() {
  const btn = document.getElementById('layout-global-btn');
  if (!btn) return;
  const anyRunning = layoutState.C1.running || layoutState.C2.running;
  const anyStarted = layoutState.C1.startMs || layoutState.C2.startMs;  if (anyRunning) {
    btn.textContent = '⏸ PARAR LÍNEA';
    btn.style.borderColor = 'var(--red)';
    btn.style.background = 'var(--red-bg)';
    btn.style.color = 'var(--red)';
  } else if (anyStarted) {
    btn.textContent = '▶ REANUDAR LÍNEA';
    btn.style.borderColor = 'var(--green)';
    btn.style.background = 'var(--green-bg)';
    btn.style.color = 'var(--green-text)';
  } else {
    btn.textContent = '▶ INICIAR LÍNEA';
    btn.style.borderColor = 'var(--blue)';
    btn.style.background = 'var(--blue-bg)';
    btn.style.color = 'var(--blue-text)';
  }
}

function checkLayoutTransitions() {
  ['C1','C2'].forEach(side => {
    const ls = layoutState[side];
    if (!ls.running) return;
    const rd = getLayoutRefData(side);
    if (!rd || !rd.pzs) return;
    const ct = getEffectiveCT(rd);
    if (!ct) return;
    const currentElapsed = getElapsedMs(side);
    LAYOUT_ROBOTS[side].forEach((robot, ri) => {
      // Skip unselected robots
      const rowRef = rows.find(r => r.layoutActive && (r.sides||[]).includes(side));
      const sel = rowRef ? (rowRef.selectedRobots || []) : [];
      if (sel.length > 0 && !sel.includes(robot.id)) return;
      const curSlot = ls.robotPhase[ri];
      const pre_cur = ls.preloaded[ri][curSlot] || 0;
      const effPzs_cur = Math.max(1, rd.pzs - pre_cur);
      const tFull_cur = effPzs_cur * ct * 1000;
      const fillElapsed = currentElapsed - ls.robotFillStartMs[ri];
      if (fillElapsed < tFull_cur) return; // still filling
      // Current slot is full — record exact fill end
      const fillEndMs = ls.robotFillStartMs[ri] + tFull_cur;
      ls.lastFillEndMs[ri][curSlot] = fillEndMs;
      // Try to move to other slot
      const otherSlot = 1 - curSlot;
      const otherSwapMs = ls.swapMs[ri][otherSlot];
      const otherLastEnd = ls.lastFillEndMs[ri][otherSlot];
      const hasFreshPallet = otherSwapMs !== null &&
        (otherLastEnd === null || otherSwapMs > otherLastEnd);
      if (!hasFreshPallet) {
        // LINE STOP — no fresh pallet at other slot, stop BOTH sides
        snapshotAutoProduced(); // congela piezas antes de parar para evitar doble conteo al reanudar
        ['C1','C2'].forEach(s => {
          const lss = layoutState[s];
          if (lss.startMs && lss.running) { lss.running = false; lss.pauseMs = Date.now(); }
        });
        return;
      }
      // Move robot: starts filling other slot
      ls.robotPhase[ri] = otherSlot;
      ls.robotFillStartMs[ri] = Math.max(fillEndMs, otherSwapMs);
    });
  });
  if (!layoutState.C1.running && !layoutState.C2.running) {
    if (layoutTimer) { clearInterval(layoutTimer); layoutTimer = null; }
  }
}


let layoutStructureHash = '';

function getLayoutStructureHash() {
  // Only full rebuild when ref changes or layout first starts
  return ['C1','C2'].map(side => {
    const row = rows.find(r => r.layoutActive && (r.sides||[]).includes(side));
    const ls = layoutState[side];
    return (row?.ref||'') + ':' + (ls.startMs?'1':'0');
  }).join('|');
}

function updateLayoutValuesOnly() {
  ['C1','C2'].forEach(side => {
    const ls = layoutState[side];
    const rd = getLayoutRefData(side);
    if (!rd) return;
    const pzs = rd.pzs || 0;
    LAYOUT_ROBOTS[side].forEach((robot, ri) => {
      robot.pallets.forEach((paletName, si) => {
        const {pct, msLeft, status} = getPalletState(side, ri, si);
        const pzsFilled = Math.round(pct / 100 * pzs);
        const isFilling = status==='filling'||status==='paused';
        const show = (id, visible) => { const el=document.getElementById(id); if(el) el.style.display=visible?'':'none'; };
        // Box class + onclick
        const boxEl = document.getElementById(`lp-box-${side}-${ri}-${si}`);
        if (boxEl) {
          boxEl.className = `lp ${status}`;
          boxEl.style.cursor = (status==='full'||isFilling)?'pointer':'default';
          if(status==='full') boxEl.onclick=()=>swapLayoutPallet(side,ri,si);
          else if(isFilling) boxEl.onclick=()=>retireLayoutPallet(side,ri,si);
          else boxEl.onclick=null;
        }
        // Fill bar
        const barEl = document.getElementById(`lp-bar-${side}-${ri}-${si}`);
        if (barEl) barEl.style.width = pct + '%';
        // Pct text
        const pctEl = document.getElementById(`lp-pct-${side}-${ri}-${si}`);
        if (pctEl) { pctEl.textContent = status==='full'?'LLENO':pct+'%'; pctEl.style.fontSize = status==='full'?'10px':''; }
        // Show/hide by status
        show(`lp-lleno-${side}-${ri}-${si}`, status==='full');
        show(`lp-inc-${side}-${ri}-${si}`, isFilling);
        show(`lp-cola-${side}-${ri}-${si}`, status==='waiting'&&ls.startMs);
        // Timer
        const timerEl = document.getElementById(`lp-timer-${side}-${ri}-${si}`);
        if (timerEl) { timerEl.style.display=isFilling?'':'none'; timerEl.textContent=fmtLayoutTimer(msLeft); }
        // Piece counter (preserve focus)
        const piecesEl = document.getElementById(`lp-pieces-${side}-${ri}-${si}`);
        if (piecesEl) { piecesEl.style.display=isFilling?'':'none'; if(document.activeElement!==piecesEl) piecesEl.value=pzsFilled; }
      });
    });
    // Action strip
    const actionEl = document.getElementById(`la-${side}`);
    if (actionEl) {
      let html = '';
      LAYOUT_ROBOTS[side].forEach((robot, ri) => {
        robot.pallets.forEach((paletName, si) => {
          if (getPalletState(side, ri, si).status==='full')
            html += `<button onclick="swapLayoutPallet('${side}',${ri},${si})"
              style="padding:7px 16px;background:var(--green-bg);border:1.5px solid var(--green);color:var(--green-text);border-radius:var(--radius);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.5px">✓ CAMBIÉ ${paletName}</button>`;
        });
      });
      if (actionEl.innerHTML !== html) actionEl.innerHTML = html;
    }
    // Stop alert + section background
    const alertEl = document.getElementById(`la-alert-${side}`);
    const sectionEl = document.getElementById(`la-section-${side}`);
    if (alertEl) {
      const stopped = !ls.running && ls.startMs && ls.pauseMs;
      const newHtml = stopped ? `<div class="layout-stop-alert stop">● PARADA</div>` : '';
      if (alertEl.innerHTML !== newHtml) alertEl.innerHTML = newHtml;
      if (sectionEl) {
        if (stopped) sectionEl.classList.add('side-stopped');
        else sectionEl.classList.remove('side-stopped');
      }
    }
    // Counts
    const retEl = document.getElementById(`la-ret-${side}`); if(retEl) retEl.textContent = ls.retiredCount;
    const liveAct2=getLiveActuales(), pzsPend2=layoutCalcDemanda>0&&pzs>0?Math.max(0,layoutCalcDemanda-liveAct2):0;
    const nec2=pzsPend2>0?Math.ceil(pzsPend2/pzs):0;
    // Update stopBadge timer
    let stopMs2=null, nextMs2=null;
    const tF2=rd&&getEffectiveCT(rd)?rd.pzs*getEffectiveCT(rd)*1000:null;
    LAYOUT_ROBOTS[side].forEach((robot,ri)=>{
      const s0=getPalletState(side,ri,0),s1=getPalletState(side,ri,1);
      if(s0.status==='filling'&&s0.msLeft!==null){if(nextMs2===null||s0.msLeft<nextMs2)nextMs2=s0.msLeft;}
      if(s1.status==='filling'&&s1.msLeft!==null){if(nextMs2===null||s1.msLeft<nextMs2)nextMs2=s1.msLeft;}
      if(s0.status==='full'&&s1.status==='filling'&&s1.msLeft!==null){if(stopMs2===null||s1.msLeft<stopMs2)stopMs2=s1.msLeft;}
      else if(s0.status==='filling'&&s1.status==='full'&&s0.msLeft!==null){if(stopMs2===null||s0.msLeft<stopMs2)stopMs2=s0.msLeft;}
      // Caso B: llenando + waiting → parada tras DOS palés (msLeft actual + tFull siguiente)
      else if(s0.status==='filling'&&s0.msLeft!==null&&s1.status==='waiting'&&tF2){const tot=s0.msLeft+tF2;if(stopMs2===null||tot<stopMs2)stopMs2=tot;}
      else if(s1.status==='filling'&&s1.msLeft!==null&&s0.status==='waiting'&&tF2){const tot=s1.msLeft+tF2;if(stopMs2===null||tot<stopMs2)stopMs2=tot;}
    });
    const badgeMs2=stopMs2!==null?stopMs2:nextMs2;
    const stopEl=document.getElementById(`la-stop-${side}`);
    if(stopEl){
      stopEl.style.display=badgeMs2!==null?'inline-block':'none';
      if(badgeMs2!==null){
        const icon='●';
        stopEl.textContent=icon+' '+fmtLayoutTimer(badgeMs2);
        const sc=badgeMs2<30000?'var(--red)':badgeMs2<120000?'var(--orange-text)':'var(--amber-text)';
        stopEl.style.color=sc; stopEl.style.borderColor=sc;
      }
    }
    // Update incBadge
    const incEl=document.getElementById(`la-inc-${side}`);
    if(incEl){incEl.style.display=ls.incompleteCount>0?'':'none';if(ls.incompleteCount>0)incEl.innerHTML=`Inc: <b>${ls.incompleteCount}</b> (${ls.incompletePzs}p)`;}
    const necEl=document.getElementById(`la-nec-${side}`); if(necEl) necEl.textContent=nec2||'—';
    const halfEl=document.getElementById(`la-half-${side}`); if(halfEl) halfEl.textContent=nec2>0?Math.ceil(nec2/2):'—';
    const necContEl=document.getElementById(`la-nec-container-${side}`); if(necContEl) necContEl.style.display=nec2>0?'flex':'none';
    const tMinEl=document.getElementById(`la-tmin-${side}`);
    if(tMinEl&&rd.ct&&pzs) tMinEl.textContent=+(pzs*getEffectiveCT(rd)/60).toFixed(1)+"'";
    // Actualizar barra A LADO
    const _enlinea=getPalesEnLinea(side); const _alado=ls.alado||0;
    const enLineaEl=document.getElementById(`la-enlinea-${side}`); if(enLineaEl) enLineaEl.textContent=_enlinea;
    const nec2El=document.getElementById(`la-nec2-${side}`); if(nec2El) nec2El.textContent=nec2||'—';
    const traerEl=document.getElementById(`la-traer-${side}`);
    if(traerEl){ const _t=Math.max(0,nec2-_enlinea-_alado); const _ok=nec2===0||_t<=0; traerEl.textContent=_ok?'✓ 0':_t; traerEl.style.color=_ok?'var(--green-text)':'var(--red)'; }
    const aladoInp=document.getElementById(`la-alado-${side}`); if(aladoInp&&document.activeElement!==aladoInp) aladoInp.value=_alado||'';
    updateSideCalcRow(side);
    updateAlmacenPanel(side);
  });
  updateLayoutStats();
}


// Per-side CR for layout
function setCRForSide(side, val) {
  const ls = layoutState[side];
  if (!ls) return;
  if (ls.crActive && val > 0 && ls.cr > 0) adjustSwapMsForRateChange(ls.cr, val);
  ls.cr = val;
  if (ls.crActive) {
    adjustSwapMsForRateChange(ls.cr, val);
  }
  layoutStructureHash = '';
  renderLineaLayout();
}
function toggleCRForSide(side) {
  const ls = layoutState[side];
  if (!ls) return;
  if (!ls.crActive) {
    if (!ls.cr) return;
    adjustSwapMsForRateChange(getEffectiveCT(getLayoutRefData(side)), ls.cr);
    ls.crActive = true;
  } else {
    adjustSwapMsForRateChange(ls.cr, getEffectiveCT(getLayoutRefData(side)));
    ls.crActive = false;
  }
  layoutStructureHash = '';
  renderLineaLayout();
}
function buildSideCalcRow(side, rd) {
  if (!rd || !rd.ct || !rd.pzs) return '';
  const ct = getEffectiveCT(rd), pzs = rd.pzs;
  const tMinRaw = pzs * ct / 60;
  const tMinH = Math.floor(tMinRaw), tMinS = Math.round((tMinRaw - tMinH) * 60);
  const tMinStr = tMinH > 0 ? `${tMinH}' ${tMinS}"` : `${Math.floor(tMinRaw)}' ${Math.round((tMinRaw%1)*60)}"`;
  const liveAct = getLiveActuales();
  const sameBoth = ['C1','C2'].filter(s=>getLayoutRefData(s)?.ref===rd.ref).length > 1;
  const actPerSide = sameBoth ? liveAct/2 : liveAct;
  const demPerSide = sameBoth ? layoutCalcDemanda/2 : layoutCalcDemanda;
  const pzsPend = demPerSide > 0 ? Math.max(0, demPerSide - actPerSide) : 0;
  // T TOTAL priority: pales+ptgpales from turno row → pzsPend/pzs → 0
  const rowRefSide = rows.find(r => r.layoutActive && (r.sides||[]).includes(side));
  const rowTotalPales = rowRefSide ? ((parseInt(rowRefSide.pales)||0) + (parseInt(rowRefSide.ptgpales)||0)) : 0;
  const palesPend = rowTotalPales > 0 ? rowTotalPales : (pzsPend > 0 ? Math.ceil(pzsPend / pzs) : 0);
  const tTot = palesPend > 0 ? (tMinRaw * palesPend) : 0;
  const tTotH = Math.floor(tTot/60), tTotM = Math.round(tTot%60);
  const tTotStr = tTot > 0 ? (tTotH>0?`${tTotH}h ${tTotM}'`:tTotM+"'") : '—';
  const sideCol = side==='C1' ? 'var(--amber-text)' : '#79c0ff';
  const ref = rd.ref||'', nombre = rd.nombre ? (rd.fr ? rd.nombre+' · '+rd.fr : rd.nombre) : '';
  // CR controls only in C1 row (CR is global, shows once)
  const crHtml = side === 'C1' ? `
    <span style="font-family:'Rajdhani',sans-serif;font-size:10px;color:var(--text3);margin-left:6px;padding-left:6px;border-left:1px solid var(--border)">CR</span>
    <input id="la-cr-C1" type="number" step="0.1" min="0" inputmode="decimal" placeholder="s/p"
      value="${globalCRActive?globalCR:(globalCRInput||globalCR||'')}" onchange="setCRFromCalcRow(+this.value)"
      style="width:52px;min-height:28px;background:var(--surface2);border:1.5px solid ${globalCRActive?'var(--green)':'var(--border2)'};color:${globalCRActive?'var(--green-text)':'var(--amber-text)'};padding:2px 6px;border-radius:5px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;text-align:center;outline:none">
    <button id="la-crbtn-C1" onclick="toggleCR()" class="cr-toggle-btn${globalCRActive?' active':''}"
      style="min-height:28px;padding:3px 8px;font-size:11px">${globalCRActive?'● CR ON':'○ CR OFF'}</button>` : '';
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:4px 6px;background:var(--surface3);border:1px solid var(--border);border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:11px">
    <span style="font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:${sideCol};white-space:nowrap">${side} · ${ref} — ${nombre}</span>
    <span style="color:var(--text3)">PZS/PALÉ <b style="color:var(--text)">${pzs}</b></span>
    <span style="color:var(--text3)">CT <b style="color:${globalCRActive?'var(--green-text)':'var(--text)'}">${ct}s</b></span>
    <span style="color:var(--text3)">T/PALÉ <b id="la-calc-tpal-${side}" style="color:var(--blue-text)">${tMinStr}</b></span>
    <span style="color:var(--text3)">PZS PEND <b id="la-calc-pend-${side}" style="color:var(--amber-text)">${pzsPend||'0'}</b></span>
    <span style="color:var(--text3)">T TOTAL <b id="la-calc-ttot-${side}" style="color:var(--text)">${tTotStr}</b></span>
    ${crHtml}
  </div>`;
}

function updateSideCalcRow(side) {
  const rd = getLayoutRefData(side);
  if (!rd) return;
  const ct = getEffectiveCT(rd), pzs = rd.pzs||0;
  if (!ct||!pzs) return;
  const tMinRaw = pzs*ct/60;
  const liveAct=getLiveActuales();
  const sameBoth=['C1','C2'].filter(s=>getLayoutRefData(s)?.ref===rd.ref).length>1;
  const actPerSide=sameBoth?liveAct/2:liveAct, demPerSide=sameBoth?layoutCalcDemanda/2:layoutCalcDemanda;
  const pzsPend=demPerSide>0?Math.max(0,demPerSide-actPerSide):0;
  const rowRefU=rows.find(r=>r.layoutActive&&(r.sides||[]).includes(side));
  const rowTotalU=rowRefU?((parseInt(rowRefU.pales)||0)+(parseInt(rowRefU.ptgpales)||0)):0;
  const palesPend=rowTotalU>0?rowTotalU:(pzsPend>0?Math.ceil(pzsPend/pzs):0);
  const tTot=palesPend>0?(tMinRaw*palesPend):0;
  const tTotH=Math.floor(tTot/60),tTotM=Math.round(tTot%60);
  const pe=document.getElementById(`la-calc-pend-${side}`); if(pe)pe.textContent=pzsPend||'0';
  const te=document.getElementById(`la-calc-ttot-${side}`); if(te)te.textContent=tTot>0?(tTotH>0?tTotH+"h "+tTotM+"'":tTotM+"'"):'—';
  // Update CR controls (C1 only, in-place)
  if (side === 'C1') {
    const crInp=document.getElementById('la-cr-C1');
    const crBtn=document.getElementById('la-crbtn-C1');
    if(crInp&&document.activeElement!==crInp) crInp.value=globalCRActive?globalCR:(globalCRInput||globalCR||'');
    if(crInp){crInp.style.borderColor=globalCRActive?'var(--green)':'var(--border2)';crInp.style.color=globalCRActive?'var(--green-text)':'var(--amber-text)';}
    if(crBtn){crBtn.textContent=globalCRActive?'● CR ON':'○ CR OFF';crBtn.classList.toggle('active',globalCRActive);}
  }
}

// Called from calc row CR input — solo actualiza el input, no aplica hasta CR ON
function setCRFromCalcRow(val) {
  globalCRInput = val;
  // No tocar globalCR ni los timers hasta que se pulse CR ON
  renderLineaLayout();
}

function resetSideLayout(side) {
  layoutState[side] = {
    running:false, startMs:null, pauseMs:null, totalPausedMs:0,
    retiredCount:0, incompleteCount:0, incompletePzs:0,
    swapMs:[[null,null],[null,null]], preloaded:[[0,0],[0,0]],
    robotPhase:[0,0], robotFillStartMs:[0,0], lastFillEndMs:[[null,null],[null,null]],
    cr:layoutState[side]?.cr||0, crActive:layoutState[side]?.crActive||false,
    almacenPzs: layoutState[side]?.almacenPzs||0
  };
}

function resetLineaLayout() {
  resetSideLayout('C1');
  resetSideLayout('C2');
  layoutStructureHash = '__reset__'; // force full rebuild on next render
  if (layoutTimer) { clearInterval(layoutTimer); layoutTimer = null; }
  renderLineaLayout();
}

function renderLineaLayout() {
  // ── Stats bar and global button visibility ──────────────────────────────
  const statsBar = document.getElementById('layout-stats-bar');
  const globalBtn = document.getElementById('layout-global-btn');
  const refListEl = document.getElementById('layout-ref-list');
  if (currentLine === 'linea4hs') {
    if (statsBar) statsBar.style.display = 'none';
    if (globalBtn) globalBtn.style.display = 'none';
    if (refListEl) refListEl.style.display = 'none';
    const l9Panel = document.getElementById('l9-ref-panel');
    if (l9Panel) l9Panel.style.display = 'none';
    const l9bar2 = document.getElementById('l9-action-bar');
    if (l9bar2) l9bar2.style.display = 'none';
    renderHslRefPanel();
    renderHslL4Panel();
    renderHSL4Layout(); return;
  } else {
    if (statsBar) statsBar.style.display = '';
    if (globalBtn) globalBtn.style.display = '';
    // Ocultar layout-ref-list y layout-top-bar en L9/L8 — cubiertos por l9-ref-panel
    const isL9L8 = currentLine==='linea9'||currentLine==='linea8';
    if (refListEl) refListEl.style.display = isL9L8 ? 'none' : '';
    const topBar = document.querySelector('#linea-layout .layout-top-bar');
    if (topBar) topBar.style.display = isL9L8 ? 'none' : '';
    const hslPanel = document.getElementById('hsl-ref-panel');
    if (hslPanel) hslPanel.style.display = 'none';
    // Mostrar barra de botones solo en L9/L8 (Sección 1)
    const l9bar = document.getElementById('l9-action-bar');
    if (l9bar) l9bar.style.display = isL9L8 ? 'flex' : 'none';
    renderL9RefPanel();
  }
  if (isUserTypingInLayout()) { updateLayoutStats(); return; }
  const container = document.getElementById('layout-both-sides');
  if (!container) return;

  // Only full rebuild when structure changes; otherwise update values in-place (no flash)
  const newHash = getLayoutStructureHash();
  if (newHash === layoutStructureHash && container.children.length > 0) {
    updateLayoutValuesOnly();
    updateGlobalLayoutBtn();
    return;
  }
  layoutStructureHash = newHash;
  const lineaName = (document.getElementById('active-linea-badge')||{}).textContent || '';
  let html = '';

  ['C1','C2'].forEach(side => {
    const ls = layoutState[side];
    const rd = getLayoutRefData(side);
    const rowRef = rows.find(r => r.layoutActive && (r.sides||[]).includes(side));
    const robots = LAYOUT_ROBOTS[side];
    const sideLabel = side === 'C1' ? 'CARRISTA 1' : 'CARRISTA 2';
    const refText = rowRef ? `${rowRef.ref} · ${rd ? rd.nombre+(rd.fr?' · '+rd.fr:'') : ''}` : '— Sin ref activa';

    const isRunning = ls.running;
    const isStarted = !!ls.startMs;

    // Alert level (same logic, no button per side now)
    let alertCls = '', alertTxt = '';
    robots.forEach((robot, ri) => {
      const s0 = getPalletState(side, ri, 0);
      if (s0.status === 'inactive') return;
      const s1 = getPalletState(side, ri, 1);
      if (s0.status === 'full' && s1.status === 'full') {
        alertCls = 'stop'; alertTxt = `🚨 ${robot.id} PARADO — CAMBIA EL PALÉ`;
      } else if (s0.status === 'full' && s1.status === 'filling' && alertCls !== 'stop') {
        const ratio = s1.tFullMs ? s1.msLeft / s1.tFullMs : 1;
        alertCls = ratio < 0.2 ? 'stop' : ratio < 0.4 ? 'urgent' : 'warn';
        alertTxt = `⚠️ ${robot.id}: cambia ${robot.pallets[0]} — ${fmtLayoutTimer(s1.msLeft)} p/ parada`;
      }
    });

    // ── PALLET ROW: each pallet as column (box + preload input below) ──
    let paletRowHtml = '';
    LAYOUT_ALL_PALLETS[side].forEach(item => {
      if (item.startsWith('R')) {
        const ri = robots.findIndex(r => r.id === item);
        const s0 = getPalletState(side, ri, 0);

          return;
        }
        const both = s0.status==='full' && s1.status==='full';
        const first = s0.status==='full';
        const cls = both ? 'stop' : first ? 'alarm' : '';
        // Times for this robot
        let stopTxt='', stopCol='var(--text3)';
        if (ls.startMs) {
          if (both) { stopTxt='🔴 PARADO'; stopCol='var(--red)'; }
          else if (first && s1.status==='filling') { stopTxt=`● ${fmtLayoutTimer(s1.msLeft)}`; stopCol='var(--orange-text)'; }
          else if (s0.status==='filling') { stopTxt=`● ${fmtLayoutTimer(s0.msLeft)}`; stopCol='var(--amber-text)'; }
        }
        paletRowHtml += `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0">
          <div class="lr ${cls}" style="cursor:default;width:26px;min-height:88px;gap:3px">
            <div class="lr-id" style="font-size:11px">${item}</div>
            ${stopTxt?`<div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:${stopCol};text-align:center;line-height:1.2;padding:0 2px">${stopTxt}</div>`:''}

      } else if (LAYOUT_BUFFER[side].includes(item)) {
        paletRowHtml += `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0">
          <div class="lp buffer" style="width:50px;height:72px"><div class="lp-name">${item}</div></div>
          <div style="height:22px"></div>
        </div>`;
      } else {
        const ri = robots.findIndex(r => r.id === PALLET_ROBOT[item]);
        const si = PALLET_SLOT[item];
        const { pct, msLeft, status } = getPalletState(side, ri, si);
        if (status === 'inactive') {
          paletRowHtml += `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0">
            <div class="lp buffer" style="width:50px;height:72px;opacity:.3"><div class="lp-name">${item}</div></div>
            <div style="height:22px"></div>
          </div>`;
          return;
        }
        const preloadVal = ls.preloaded[ri][si] || 0;
        const pzs = rd ? rd.pzs : 0;
        // Tapping logic: full = confirm swap, filling/paused = retire incomplete
        let onclick = '';
        if (ls.startMs) {
          if (status === 'full') onclick = `onclick="swapLayoutPallet('${side}',${ri},${si})"`;
          else if (status === 'filling' || status === 'paused') onclick = `onclick="retireLayoutPallet('${side}',${ri},${si})"`;
        }
        const isFilling = status==='filling'||status==='paused';
        const isWaiting = status==='waiting';
        const pzsFilled = Math.round(pct / 100 * (pzs || 1));
        let inner = `<div class="lp-name">${item}</div>
          <div id="lp-pct-${side}-${ri}-${si}" class="lp-pct" style="${status==='full'?'font-size:10px':''}">${status==='full'?'LLENO':pct+'%'}</div>
          <div id="lp-lleno-${side}-${ri}-${si}" style="font-size:8px;color:var(--green-text);display:${status==='full'?'':'none'}">✓ tap</div>
          <div id="lp-timer-${side}-${ri}-${si}" class="lp-timer" style="font-size:9px;display:${isFilling?'':'none'}">${fmtLayoutTimer(msLeft)}</div>
          <input id="lp-pieces-${side}-${ri}-${si}" type="number" min="${preloadVal}" max="${pzs||999}" inputmode="numeric"
            value="${pzsFilled}" onchange="adjustPalletPieces('${side}',${ri},${si},+this.value)" onclick="this.select()"
            style="width:38px;font-size:10px;text-align:center;background:transparent;border:none;border-bottom:1px dashed rgba(88,166,255,.4);color:#79c0ff;font-family:'IBM Plex Mono',monospace;padding:0 1px;outline:none;cursor:pointer;line-height:1;display:${isFilling?'':'none'}">
          <div id="lp-inc-${side}-${ri}-${si}" style="font-size:8px;color:#f97316;line-height:1;display:${isFilling?'':'none'}">↑ inc</div>
          <div id="lp-cola-${side}-${ri}-${si}" style="font-size:8px;color:var(--text3);display:${isWaiting&&ls.startMs?'':'none'}">COLA</div>
          <div id="lp-bar-${side}-${ri}-${si}" class="lp-bar" style="width:${pct}%"></div>`;
        paletRowHtml += `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0">
          <div id="lp-box-${side}-${ri}-${si}" class="lp ${status}" style="width:50px;height:72px;cursor:${onclick?'pointer':'default'}" ${onclick}>${inner}</div>
          <div style="display:flex;align-items:center;gap:2px">
            <button onclick="(function(){const el=document.getElementById('lp-pieces-${side}-${ri}-${si}');const cur=parseInt(el?el.value:0)||0;adjustPalletPieces('${side}',${ri},${si},cur-1)})()"
              style="width:22px;height:22px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:14px;line-height:1;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center">−</button>
            <button onclick="(function(){const el=document.getElementById('lp-pieces-${side}-${ri}-${si}');const cur=parseInt(el?el.value:0)||0;adjustPalletPieces('${side}',${ri},${si},cur+1)})()"
              style="width:22px;height:22px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:14px;line-height:1;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center">+</button>
          </div>
        </div>`;
      }
    });
    paletRowHtml += `<div style="flex-shrink:0"><div class="lp-malas" style="height:72px"><div class="lp-malas-label">🗑<br>Malas</div></div></div>`;
    paletRowHtml += `<div style="flex-shrink:0;align-self:center;margin-left:4px">${buildAlmacenPanel(side)}</div>`;

    // ── STOP COUNTDOWN: time until line stop (urgent) or next fill (info) ──
    let stopMs = null;   // imminent stop
    let nextMs = null;   // next pallet fill (no stop)
    robots.forEach((robot, ri) => {
      const tFull = (rd && getEffectiveCT(rd)) ? rd.pzs * getEffectiveCT(rd) * 1000 : null;
      const s0 = getPalletState(side, ri, 0), s1 = getPalletState(side, ri, 1);
      // Track next fill regardless
      if (s0.status==='filling'&&s0.msLeft!==null) { if(nextMs===null||s0.msLeft<nextMs) nextMs=s0.msLeft; }
      if (s1.status==='filling'&&s1.msLeft!==null) { if(nextMs===null||s1.msLeft<nextMs) nextMs=s1.msLeft; }
      // Caso A: un slot lleno + otro llenando → parada al terminar el que llena
      if (s0.status==='full' && s1.status==='filling' && s1.msLeft!==null) {
        if (stopMs===null||s1.msLeft<stopMs) stopMs=s1.msLeft;
      } else if (s0.status==='filling' && s1.status==='full' && s0.msLeft!==null) {
        if (stopMs===null||s0.msLeft<stopMs) stopMs=s0.msLeft;
      }
      // Caso B: robot llenando + otro slot waiting (palé fresco) → parada tras DOS palés
      // msLeft(actual) + tFull(siguiente) = tiempo real hasta stop si no se cambia nada
      else if (s0.status==='filling' && s0.msLeft!==null && s1.status==='waiting' && tFull) {
        const total = s0.msLeft + tFull;
        if (stopMs===null||total<stopMs) stopMs=total;
      } else if (s1.status==='filling' && s1.msLeft!==null && s0.status==='waiting' && tFull) {
        const total = s1.msLeft + tFull;
        if (stopMs===null||total<stopMs) stopMs=total;
      }
    });
    const badgeMs = stopMs!==null?stopMs:nextMs;
    const badgeIcon = '●';
    const stopColor = badgeMs===null?'var(--text3)':badgeMs<30000?'var(--red)':badgeMs<120000?'var(--orange-text)':'var(--amber-text)';
    const stopBadge = `<span id="la-stop-${side}" style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:${stopColor};background:var(--surface2);border:1px solid ${stopColor};border-radius:6px;padding:3px 8px;white-space:nowrap;display:${badgeMs!==null?'inline-block':'none'}">${badgeIcon} ${badgeMs!==null?fmtLayoutTimer(badgeMs):''}</span>`;

    // ── ACTION STRIP (only full pallets that need confirmation) ──
    let actionHtml = '';
    const fullBtns = [];
    robots.forEach((robot, ri) => {
      robot.pallets.forEach((paletName, si) => {
        const { status } = getPalletState(side, ri, si);
        if (status === 'full') {
          fullBtns.push(`<button onclick="swapLayoutPallet('${side}',${ri},${si})"
            style="padding:7px 16px;background:var(--green-bg);border:1.5px solid var(--green);color:var(--green-text);border-radius:var(--radius);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:.5px">
            ✓ CAMBIÉ ${paletName}</button>`);
        }
      });
    });
    if (fullBtns.length) actionHtml = `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${fullBtns.join('')}</div>`;

    // Build info badges: pos, ptg, pca, pzs + row card data (T MIN, NEC, ÷2)
    const posBadge = rd ? `<span style="font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;background:#271000;color:#f97316;border:1px solid #c2410c;border-radius:5px;padding:2px 6px;white-space:nowrap">${rd.pos}</span>` : '';
    const ptgBadge = (rd && rd.ptg) ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;background:var(--green-bg);color:var(--green-text);border:1px solid var(--green);border-radius:5px;padding:2px 6px;white-space:nowrap">${rd.ptg}</span>` : '';
    const pcaBadge = (rd && rd.pca && rd.pca !== 'PCA') ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:1px 5px;white-space:nowrap">${rd.pca}</span>` : '';
    const incBadge = `<span id="la-inc-${side}" style="font-family:'Rajdhani',sans-serif;font-size:11px;color:#f97316;white-space:nowrap;display:${ls.incompleteCount>0?'':'none'}">Inc: <b>${ls.incompleteCount}</b> (${ls.incompletePzs}p)</span>`;

    // Row card values: T MIN, R MIN, NEC, ÷2
    const activeRow = rows.find(r => r.layoutActive && (r.sides||[]).includes(side));
    const ct = rd ? getEffectiveCT(rd) : 0;
    const tMin = (rd && rd.pzs && rd.ct) ? +(rd.pzs * rd.ct / 60).toFixed(1) : null;
    const rMin = (rd && rd.pzs && globalCRActive && globalCR) ? +(rd.pzs * globalCR / 60).toFixed(1) : null;
    const rowPales = activeRow ? (+activeRow.pales || 0) : 0;
    const liveAct2 = getLiveActuales();
    const pzsPend2 = layoutCalcDemanda > 0 && rd ? Math.max(0, layoutCalcDemanda - liveAct2) : 0;
    const nec = (pzsPend2 > 0 && rd && rd.pzs) ? Math.ceil(pzsPend2 / rd.pzs) : 0;
    const half = nec > 0 ? Math.ceil(nec / 2) : 0;

    const tMinBadge = tMin ? `<div style="display:flex;flex-direction:column;align-items:center;background:var(--surface3);border:1px solid var(--border2);border-radius:5px;padding:2px 6px;min-width:36px">
      <div style="font-family:'Rajdhani',sans-serif;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px">T MIN</div>
      <div id="la-tmin-${side}" style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--blue-text);line-height:1">${tMin + "'"}</div>
      ${rMin ? `<div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--green-text);line-height:1">${rMin}'</div>` : ''}
    </div>` : '';

    const necBadge = `<div id="la-nec-container-${side}" style="display:${nec>0?'flex':'none'};gap:4px;align-items:stretch">
      <div style="display:flex;flex-direction:column;align-items:center;background:var(--surface3);border:1px solid var(--border2);border-radius:5px;padding:2px 6px;min-width:36px">
        <div style="font-family:'Rajdhani',sans-serif;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px">NEC.</div>
        <div id="la-nec-${side}" style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--amber-text);line-height:1">${nec||'—'}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;background:var(--navy);border:1px solid var(--blue);border-radius:5px;padding:2px 6px;min-width:32px">
        <div style="font-family:'Rajdhani',sans-serif;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px">÷2</div>
        <div id="la-half-${side}" style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--blue-text);line-height:1">${half||'—'}</div>
      </div>
    </div>`;

    html += `<div class="layout-side-section${alertCls==='stop'?' side-stopped':''}" id="la-section-${side}">
      <div id="la-alert-${side}">${alertCls ? `<div class="layout-stop-alert ${alertCls}">${alertCls==='stop'?'● PARADA':alertTxt}</div>` : ''}</div>
      <div class="layout-side-hdr">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;flex:1;min-width:0">
          <span class="layout-side-label ${side.toLowerCase()}">${sideLabel}</span>
          <span style="font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--amber-text);background:var(--amber-bg);border:1px solid var(--amber);border-radius:6px;padding:2px 7px;white-space:nowrap">${refText}</span>
          ${posBadge}${ptgBadge}${pcaBadge}
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
          ${tMinBadge}${necBadge}
          ${stopBadge}
          <button onclick="retireSidePallets('${side}')"
            style="padding:5px 10px;background:var(--surface2);border:1.5px solid var(--border2);color:var(--text2);border-radius:var(--radius);font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:.3px"
            title="Retirar todos los cestones llenos de este lado">
            ↑ Cestón</button>
          <span style="font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--text2)">Ret: <b id="la-ret-${side}" style="color:var(--amber-text)">${ls.retiredCount}</b></span>
          ${incBadge}
        </div>
      </div>
      <div id="la-alado-bar-${side}" style="display:${rd?'flex':'none'};align-items:center;gap:6px;flex-wrap:wrap;padding:4px 8px;background:var(--surface2);border-radius:5px;border:1px solid var(--border);margin-bottom:4px;font-family:'Rajdhani',sans-serif;font-size:12px">
        <span style="color:var(--text3);font-weight:700;letter-spacing:.3px">A LADO</span>
        <input id="la-alado-${side}" type="number" min="0" inputmode="numeric"
          value="${ls.alado||''}" placeholder="0"
          onchange="event.stopPropagation();setAlado('${side}',+this.value)"
          style="width:42px;min-height:28px;background:var(--surface3);border:1.5px solid var(--border2);color:var(--text);padding:2px 5px;border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;text-align:center;outline:none">
        <span style="color:var(--text3)">EN LÍNEA <b id="la-enlinea-${side}" style="color:var(--text)">${getPalesEnLinea(side)}</b></span>
        <span style="color:var(--text3)">NEC <b id="la-nec2-${side}" style="color:var(--amber-text)">${nec||'—'}</b></span>
        <span style="width:1px;height:14px;background:var(--border2);flex-shrink:0"></span>
        <span style="font-weight:700;font-size:13px;color:var(--text3)">TRAER</span>
        ${(()=>{ const _t=Math.max(0,nec-getPalesEnLinea(side)-(ls.alado||0)); const _ok=nec===0||_t<=0; return `<span id="la-traer-${side}" style="font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:${_ok?'var(--green-text)':'var(--red)'}">${_ok?'&#x2713; 0':_t}</span>`; })()}
      </div>
      <div style="overflow-x:auto;scrollbar-width:none;padding-bottom:2px">
        <div style="display:flex;gap:3px;align-items:flex-start;min-width:max-content">${paletRowHtml}</div>
      </div>
      <div id="la-${side}">${actionHtml}</div>
      <div id="la-calc-${side}" style="margin-top:4px">${buildSideCalcRow(side, rd)}</div>
    </div>`;
  });

  // Cinta between sides
  const secondSide = html.indexOf('<div class="layout-side-section">', 30);
  html = html.substring(0, secondSide)
    + `<div class="layout-cinta">── <span>${lineaName}</span> ──────────────────────</div>\n`
    + html.substring(secondSide);

  container.innerHTML = html;

  updateGlobalLayoutBtn();
  updateLayoutStats();
  // renderLayoutRefList called only on ref changes, not every tick
}

// ── PANEL DE SELECCIÓN DE REFS L9 (C1 / C2) ─────────────────────────────────

function renderL9RefPanel() {
  const panel = document.getElementById('l9-ref-panel');
  if (!panel) return;
  const isL9L8 = currentLine === 'linea9' || currentLine === 'linea8';
  if (!isL9L8) { panel.style.display = 'none'; return; }
  panel.style.display = '';
  // Anti-parpadeo: solo reconstruir si cambia algo estructural
  const _panelHash = rows.filter(r=>r.ref&&(r.l9Panel||(r.sides||[]).some(s=>s==='C1'||s==='C2')))
    .map(r=>r.ref+':'+(r.sides||[]).join(',')+':'+(r.layoutActive?'1':'0')).join('|');
  if (panel._lastHash === _panelHash && panel.children.length > 0) return;
  panel._lastHash = _panelHash;

  const allData = DATA[currentLine] || [];
  const seen = new Set();
  const dataRefs = allData.filter(rd => { if(seen.has(rd.ref)) return false; seen.add(rd.ref); return true; });

  // Refs en el panel: tienen l9Panel o tienen sides C1/C2
  const panelRows = rows.map((r, idx) => ({ r, idx }))
    .filter(({ r }) => r.ref && (r.l9Panel || (r.sides||[]).some(s => s==='C1'||s==='C2')));

  const sortedRefs = [...dataRefs].sort((a,b) => parseInt(a.ref)-parseInt(b.ref));
  const opts = '<option value="">+ añadir ref</option>'
    + sortedRefs.map(rd => {
        const inList = panelRows.some(({ r }) => r.ref === rd.ref);
        const label = fmtOpt(rd);
        return `<option value="${rd.ref}">${label}${inList?' ✓':''}`;
      }).join('');

  const SIDE_DEFS = [
    { val:'C1', lbl:'C1', bg_act:'var(--amber-bg)', col_act:'var(--amber-text)', brd_act:'var(--amber)' },
    { val:'C2', lbl:'C2', bg_act:'#0c1929',         col_act:'#79c0ff',           brd_act:'var(--blue)'  }
  ];

  const items = panelRows.map(({ r, idx }) => {
    const rd = getRef(r.ref); if (!rd) return '';
    const activeSides = r.sides || [];
    const inLayout = r.layoutActive;
    const bg   = inLayout ? '#071a0f' : 'var(--surface2)';
    const bord = inLayout ? '1.5px solid var(--green)' : '1px solid var(--border2)';
    const nameCol = inLayout ? 'var(--green-text)' : 'var(--text2)';

    const sideBtns = SIDE_DEFS.map(sd => {
      const act = activeSides.includes(sd.val);
      const bg2  = act ? sd.bg_act  : 'var(--surface3)';
      const col2 = act ? sd.col_act : 'var(--text3)';
      const brd2 = act ? sd.brd_act : 'var(--border2)';
      return `<button onclick="event.stopPropagation();l9AssignSide(${idx},'${sd.val}')"
        style="padding:2px 9px;min-height:22px;border-radius:8px;border:1px solid ${brd2};background:${bg2};color:${col2};font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer">${sd.lbl}</button>`;
    }).join('');

    let robotBtns = '';
    if (activeSides.length > 0 && typeof LAYOUT_ROBOTS !== 'undefined') {
      activeSides.forEach(side => {
        if (!LAYOUT_ROBOTS[side]) return;
        LAYOUT_ROBOTS[side].forEach(rob => {
          const isSel = (r.selectedRobots||[]).includes(rob.id);
          const rc  = isSel ? 'var(--green)'      : 'var(--border2)';
          const rbg = isSel ? '#0d2318'            : 'var(--surface3)';
          const rtc = isSel ? 'var(--green-text)'  : 'var(--text2)';
          robotBtns += `<button onclick="event.stopPropagation();l9ToggleRobot(${idx},'${rob.id}')"
            style="padding:2px 8px;min-height:22px;border-radius:6px;border:1.5px solid ${rc};background:${rbg};color:${rtc};font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;cursor:pointer">${isSel?'\u25cf':'\u25cb'} ${rob.id}</button>`;
        });
      });
    }

    const posHtml = rd.pos ? `<span style="font-family:'Rajdhani',sans-serif;font-size:10px;background:#271000;color:#f97316;border:1px solid #c2410c;border-radius:4px;padding:1px 5px;white-space:nowrap">${rd.pos}</span>` : '';
    const ptgHtml = rd.ptg ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--green-bg);color:var(--green-text);border:1px solid var(--green);border-radius:4px;padding:1px 5px;white-space:nowrap;font-weight:700">${rd.ptg}</span>` : '';
    const pcaHtml = (rd.pca && rd.pca!=='PCA') ? `<span style="font-family:'Rajdhani',sans-serif;font-size:10px;color:var(--text3);white-space:nowrap">REF PCA</span><span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text2);background:var(--surface3);border:1px solid var(--border);border-radius:3px;padding:1px 4px;white-space:nowrap">${rd.pca}</span>` : '';
    const ct = getEffectiveCT(rd);
    const tMin = (ct && rd.pzs) ? +(rd.pzs * ct / 60).toFixed(1) : null;
    const tHtml = tMin ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--blue-text);white-space:nowrap">${tMin}'</span>` : '';
    const checkHtml = inLayout ? '<span style="color:var(--green-text);font-size:13px">\u2713</span>' : '';

    return `<div onclick="l9ToggleLayoutActive(${idx})" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:5px 8px;border-radius:6px;border:${bord};background:${bg};margin-top:3px;cursor:pointer">
      <span style="font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:var(--amber-text)">${r.ref}</span>
      <span style="font-family:'Rajdhani',sans-serif;font-size:10px;color:${nameCol};flex:1;min-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${rd.nombre+(rd.fr?" · "+rd.fr:"")}</span>
      ${posHtml}${ptgHtml}${pcaHtml}${tHtml}
      <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap">${rd.pzs} pzs</span>
      ${checkHtml}
      <button onclick="event.stopPropagation();l9RemoveRef(${idx})"
        style="padding:1px 7px;min-height:20px;border-radius:5px;border:1px solid var(--border2);background:var(--surface3);color:var(--red);font-family:'Rajdhani',sans-serif;font-size:11px;cursor:pointer;flex-shrink:0" title="Quitar">\u2715</button>
    </div>`;
  }).join('');

  const activeCount = panelRows.filter(({ r }) => r.layoutActive).length;
  const lineName = currentLine === 'linea9' ? 'LÍNEA 9' : 'LÍNEA 8';

  // Ocultar load-bar original — integrado en este panel
  const lb = document.getElementById('load-bar');
  if (lb) lb.style.display = 'none';

  panel.innerHTML = `<div style="background:var(--surface);border-bottom:1px solid var(--border)">
    <div style="padding:6px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:var(--amber);white-space:nowrap">📍 ${lineName}</span>
      <select onchange="(function(s){var v=s.value;s.selectedIndex=0;l9AddRef(v);})(this)"
        style="flex:1;min-width:120px;max-width:260px;background:var(--surface2);border:1px solid var(--border2);color:var(--amber-text);border-radius:6px;padding:4px 8px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;cursor:pointer;outline:none;min-height:34px">

// Añade ref al panel sin lado asignado aún
function l9AddRef(refVal) {
  if (!refVal) return;
  const rd = getRef(refVal); if (!rd) return;
  if (rows.some(r => r.ref === refVal && (r.l9Panel || (r.sides||[]).some(s=>s==='C1'||s==='C2')))) {
    renderL9RefPanel(); return;
  }
  let rowIdx = rows.findIndex(r => r.ref === refVal);
  if (rowIdx < 0) {
    rowIdx = rows.findIndex(r => !r.ref);
    if (rowIdx < 0) return;
    rows[rowIdx].ref = refVal;
    rows[rowIdx].sides = [];
    rows[rowIdx].layoutActive = false;
    rows[rowIdx].pales = '';
  }
  rows[rowIdx].l9Panel = true;
  renderL9RefPanel();
  renderLayoutRefList();
}

// Asigna/desasigna lado C1 o C2 — solo configura, NO activa el layout
function l9AssignSide(rowIdx, sideVal) {
  const r = rows[rowIdx]; if (!r) return;
  const sides = r.sides || [];
  if (sides.includes(sideVal)) {
    rows[rowIdx].sides = sides.filter(s => s !== sideVal);
    if (!rows[rowIdx].sides.length) rows[rowIdx].layoutActive = false;

// Reinicia solo el conteo (Ret, piezas actuales) sin tocar timers ni estado de palés
// Palés a lado de la línea (reserva cerca, por carrista)
function setAlado(side, val) {

  updateLayoutValuesOnly();
}

// Palés actualmente en la línea (slots con palé puesto: filling, full, waiting con palé)
function getPalesEnLinea(side) {
  const ls = layoutState[side];
  if (!ls.startMs) return 0;
  let count = 0;
  LAYOUT_ROBOTS[side].forEach((robot, ri) => {
    for (let si = 0; si < 2; si++) {
      const st = getPalletState(side, ri, si);
      // slot con palé puesto = filling, full, o waiting con swapMs !== null
      if (st.status === 'filling' || st.status === 'full' ||
          (st.status === 'waiting' && ls.swapMs[ri][si] !== null)) count++;
    }
  });
  return count;
}

// Cambio de referencia: acumula Ret en tarjeta del turno y reinicia layout del lado
function cambioDeRef(side) {
  const ls = layoutState[side];
  if (!ls) return;
  const ret = ls.retiredCount || 0;
  if (ret > 0) {
    const rowIdx = rows.findIndex(r => r.layoutActive && (r.sides||[]).includes(side));
    if (rowIdx >= 0) {
      const cur = parseFloat(rows[rowIdx].pales) || 0;
      rows[rowIdx].pales = String(cur + ret);
      updateRow(rowIdx);
      const pinp = document.getElementById('pales-inp-' + rowIdx);
      if (pinp) pinp.value = rows[rowIdx].pales;
    }
  }
  resetSideLayout(side);
  layoutStructureHash = '';
  if (!layoutTimer) {
    layoutTimer = setInterval(() => { checkLayoutTransitions(); renderLineaLayout(); }, 1000);
  }
  renderLineaLayout();
  renderL9RefPanel();
}

function resetLayoutConteo() {
  ['C1','C2'].forEach(side => {
    layoutState[side].retiredCount = 0;
    layoutState[side].incompleteCount = 0;
    layoutState[side].incompletePzs = 0;
  });
  layoutCalcActuales = 0;
  layoutCalcAutoProduced = 0;
  layoutCalcAutoRefElapsedMs = layoutState.C1.startMs ? getElapsedMs('C1') : 0;
  layoutStructureHash = '';
  renderLineaLayout();
  updateLayoutStats();
}

// ── PANEL INCOMPLETO ALMACÉN (L9/L8) ────────────────────────────────────────
// Calcula recomendación para palé incompleto del almacén dado un side
// Retorna: { rec:'ÚLTIMO'|'AHORA'|'NO USAR', incSi:n, incUlt:m, detalle:string }
function calcAlmacenRec(side, almacenPzs) {
  if (!almacenPzs || almacenPzs <= 0) return null;
  const rd = getLayoutRefData(side);
  if (!rd || !rd.pzs) return null;
  const pzs = rd.pzs;
  const rowRef = rows.find(r => r.layoutActive && (r.sides||[]).includes(side));
  const totalPales = rowRef ? ((parseInt(rowRef.pales)||0) + (parseInt(rowRef.ptgpales)||0)) : 0;
  const liveAct = getLiveActuales();
  const sameBoth = ['C1','C2'].filter(s => getLayoutRefData(s)?.ref === rd.ref).length > 1;
  const actPerSide = sameBoth ? liveAct / 2 : liveAct;
  const demPerSide = sameBoth ? layoutCalcDemanda / 2 : layoutCalcDemanda;
  const pzsPend = demPerSide > 0 ? Math.max(0, demPerSide - actPerSide) : (totalPales > 0 ? totalPales * pzs : 0);
  if (!pzsPend) return null;

  // El incompleto son piezas ADICIONALES a gestionar (se suman a la demanda)
  const totalConInc = pzsPend + almacenPzs;
  const pzsFaltanRobot = Math.max(0, pzs - almacenPzs); // piezas que el robot aún debe añadir al incompleto

  // Opción SIN incompleto: sobrante puro de la demanda
  const sobrante = pzsPend % pzs;

  // Opción AHORA: meter el incompleto primero.
  // El robot completa el incompleto (+pzsFaltanRobot), luego hace palés completos con lo que queda.
  // Total pzs que el robot produce = pzsFaltanRobot + pzsPend
  // Esas pzsPend se reparten en palés completos: sobrante = pzsPend % pzs
  const sobranteAhora = pzsPend % pzs;
  const incAhora = sobranteAhora > 0 ? 1 : 0;

  // Opción ÚLTIMO: hacer primero todos los palés completos de la demanda, luego el incompleto al final.
  // Sobrante de la demanda = sobrante. El incompleto "absorbe" ese sobrante.
  // Si almacenPzs + sobrante >= pzs → el incompleto + sobrante forma un palé completo → 0 inc
  // Si almacenPzs + sobrante < pzs  → queda un palé incompleto final → 1 inc
  const incUlt = sobrante === 0 ? 0 : ((almacenPzs + sobrante >= pzs) ? 0 : 1);

  let rec, detalle;
  if (almacenPzs >= pzs) {
    rec = 'NO USAR';
    detalle = `${almacenPzs}≥${pzs} pzs/palé`;
  } else if (incUlt <= incAhora) {
    rec = 'ÚLTIMO';
    detalle = `+${pzsFaltanRobot}p → ${incUlt === 0 ? '0 inc ✓' : incUlt + ' inc'}`;
  } else {
    rec = 'AHORA';
    detalle = `+${pzsFaltanRobot}p → ${incAhora === 0 ? '0 inc ✓' : incAhora + ' inc'}`;
  }

  return { rec, incAhora, incUlt, detalle, sobrante, almacenPzs, pzs, pzsPend, totalConInc };
}

function setAlmacenPzs(side, val) {
  if (!layoutState[side]) return;
  layoutState[side].almacenPzs = Math.max(0, val || 0);
  updateLayoutValuesOnly();
}

// Genera HTML del panel incompleto almacén (L9/L8). ID estable: la-almacen-{side}

// Actualiza el panel de incompleto de almacén en-place (anti-parpadeo)
function updateAlmacenPanel(side) {
  const ls = layoutState[side];
  const almacenPzs = ls.almacenPzs || 0;
  const rd = getLayoutRefData(side);
  const pzs = rd ? rd.pzs : 0;

  const inpEl = document.getElementById(`la-almacen-inp-${side}`);
  if (inpEl && document.activeElement !== inpEl) {
    inpEl.value = almacenPzs || '';
    inpEl.style.borderColor = almacenPzs > 0 ? 'var(--amber)' : 'var(--border2)';
    inpEl.style.color = almacenPzs > 0 ? 'var(--amber-text)' : 'var(--text2)';
    inpEl.max = pzs || 999;
  }

  const panelEl = document.getElementById(`la-almacen-${side}`);
  if (!panelEl) return;

  // Actualizar solo el bloque de recomendación (último div dentro del panel)
  const info = calcAlmacenRec(side, almacenPzs);
  const recColor = !info ? 'var(--text3)' :
    info.rec === 'AHORA' ? 'var(--green-text)' :
    info.rec === 'ÚLTIMO' ? 'var(--amber-text)' : 'var(--red)';
  const recBg = !info ? 'var(--surface3)' :
    info.rec === 'AHORA' ? 'var(--green-bg)' :
    info.rec === 'ÚLTIMO' ? 'var(--amber-bg)' : 'var(--red-bg)';
  const recBorder = !info ? 'var(--border2)' :
    info.rec === 'AHORA' ? 'var(--green)' :
    info.rec === 'ÚLTIMO' ? 'var(--amber)' : 'var(--red)';
  const newRec = info
    ? `<div style="background:${recBg};border:1px solid ${recBorder};border-radius:4px;padding:2px 5px;text-align:center"><div style="font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:${recColor};white-space:nowrap">${info.rec}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:${recColor};white-space:nowrap;opacity:.85">${info.detalle}</div></div>`
    : '';

  // Reemplazar solo el último hijo (rec block) si existe, o añadirlo
  const children = panelEl.children;
  const lastChild = children[children.length - 1];
  // El último hijo es el rec block si tiene un div dentro con font-weight:700
  const isRecBlock = lastChild && lastChild.style && lastChild.style.textAlign === 'center';
  if (newRec) {
    const tmp = document.createElement('div');
    tmp.innerHTML = newRec;
    const newEl = tmp.firstChild;
    if (isRecBlock) panelEl.replaceChild(newEl, lastChild);
    else panelEl.appendChild(newEl);
  } else if (isRecBlock) {
    panelEl.removeChild(lastChild);
  }
}

let hslStructHash = '';

// HS: 2 operarios × 2 pares × 2 palés (par simultáneo)
// L4: 2 operarios × 2 slots (secuencial)
const HS_OPS = [
  { id:'OP1', pairs:[['OP1AA','OP1AB'],['OP1BA','OP1BB']] },
  { id:'OP2', pairs:[['OP2AA','OP2AB'],['OP2BA','OP2BB']] }
];
const L4_OPS = [
  { id:'OP1', pallets:['OP1A','OP1B'] },
  { id:'OP2', pallets:['OP2A','OP2B'] }
];

function makeHSL4OpState() {
  return { running:false, startMs:null, pauseMs:null, totalPausedMs:0,
    retiredCount:0, incompleteCount:0, incompletePzs:0,
    opPhase:[0,0], opFillStartMs:[0,0],
    swapMs:[[null,null],[null,null]],
    lastFillEndMs:[[null,null],[null,null]],
    preloaded:[[0,0],[0,0]],
    cr:0, crActive:false,
    calcDemanda:0, calcActuales:0, calcAutoProduced:0, calcAutoRefElapsed:0,
    almacenPzs:0 };
}
let hsState   = makeHSL4OpState();
let l4State   = makeHSL4OpState();
let hsL4Timer = null;

function getHSElapsed() { const s=hsState; if(!s.startMs)return 0; return(s.pauseMs?s.pauseMs:Date.now())-s.startMs-s.totalPausedMs; }
function getL4Elapsed() { const s=l4State; if(!s.startMs)return 0; return(s.pauseMs?s.pauseMs:Date.now())-s.startMs-s.totalPausedMs; }

// HS CT: use hsState CR if active, else ref CT
function getHSCT(rd) { return (hsState.crActive&&hsState.cr)?hsState.cr:(rd?rd.ct:0); }
// L4 CT: use l4State CR if active, else ref CT
function getL4CT(rd) { return (l4State.crActive&&l4State.cr)?l4State.cr:(rd?rd.ct:0); }

// Live actuales per sub-line (tracks production at current CT)
function getLiveActualesHS() {
  const s=hsState;
  const rd=getHSRefData(0)||getHSRefData(1);
  const ct=getHSCT(rd);
  const pzs=hslGetPzs(rd);
  const n=Math.max(1,[...new Set(
    rows.filter(r=>r.layoutActive&&(r.sides||[]).some(s2=>s2.startsWith('HS'))).flatMap(r=>r.sides.filter(s2=>s2.startsWith('HS')))
  )].length); // número de operarios activos (HSOP1, HSOP2)
  const elapsed=getHSElapsed();
  const period=ct>0&&pzs>0?Math.max(0,Math.floor((elapsed-s.calcAutoRefElapsed)*n/(ct*1000))):0;
  return s.calcActuales+s.calcAutoProduced+period;
}
function getLiveActualesL4() {
  const s=l4State;
  const rd=getL4RefData(0)||getL4RefData(1);
  const ct=getL4CT(rd);
  const pzs=hslGetPzs(rd);
  const n=Math.max(1,[...new Set(
    rows.filter(r=>r.layoutActive&&(r.sides||[]).some(s2=>s2.startsWith('L4'))).flatMap(r=>r.sides.filter(s2=>s2.startsWith('L4')))
  )].length);
  const elapsed=getL4Elapsed();
  const period=ct>0&&pzs>0?Math.max(0,Math.floor((elapsed-s.calcAutoRefElapsed)*n/(ct*1000))):0;
  return s.calcActuales+s.calcAutoProduced+period;
}
function snapshotHSAuto() {
  const s=hsState; const rd=getHSRefData(0)||getHSRefData(1);
  const ct=getHSCT(rd), n=Math.max(1,getHSRows().length), el=getHSElapsed();
  if(ct>0&&el>s.calcAutoRefElapsed){s.calcAutoProduced+=Math.max(0,Math.floor((el-s.calcAutoRefElapsed)*n/(ct*1000)));s.calcAutoRefElapsed=el;}
}
function snapshotL4Auto() {
  const s=l4State; const rd=getL4RefData(0)||getL4RefData(1);
  const ct=getL4CT(rd), n=Math.max(1,getL4Rows().length), el=getL4Elapsed();
  if(ct>0&&el>s.calcAutoRefElapsed){s.calcAutoProduced+=Math.max(0,Math.floor((el-s.calcAutoRefElapsed)*n/(ct*1000)));s.calcAutoRefElapsed=el;}
}

// Find HS refs (up to 2): sorted by row index
function getHSRows() { return rows.filter(r=>r.layoutActive&&((r.sides||[]).some(s=>s==='HS'||s==='HSOP1'||s==='HSOP2'))&&getRef(r.ref)); }
// Find L4 refs by row order: first = OP1 (izq), second = OP2 (der)
function getL4Rows() { return rows.filter(r=>r.layoutActive&&((r.sides||[]).includes('L4OP1')||(r.sides||[]).includes('L4OP2'))&&getRef(r.ref)); }

function getHSRefData(opIdx) {
  // Try HSOP1/HSOP2 specific first, then generic HS rows by order
  const specificSide = opIdx===0?'HSOP1':'HSOP2';
  let row = rows.find(r=>r.layoutActive&&(r.sides||[]).includes(specificSide)&&getRef(r.ref));
  if(!row) {
    const hr = rows.filter(r=>r.layoutActive&&((r.sides||[]).some(s=>s==='HS'))&&getRef(r.ref));
    row = hr[opIdx];
  }
  return row?getRef(row.ref):null;
}
function getL4RefData(opIdx) {
  const side=opIdx===0?'L4OP1':'L4OP2';
  const row=rows.find(r=>r.layoutActive&&(r.sides||[]).includes(side)&&getRef(r.ref));
  return row?getRef(row.ref):null;
}
function getL4RowForOp(opIdx) {
  const side=opIdx===0?'L4OP1':'L4OP2';
  return rows.find(r=>r.layoutActive&&(r.sides||[]).includes(side));
}
// CT functions use per-section CR (not global CR)
// Correct versions already defined above; this comment replaces the old duplicate

// ── HS pair state (both pallets fill simultaneously) ──
// ── Stop countdown helpers ──
function calcHSStopMs() {
  if(!hsState.running&&!hsState.startMs) return {stopMs:null,nextMs:null};
  let stopMs=null, nextMs=null;
  HS_OPS.forEach((op,oi)=>{
    const s0=getHSPairState(oi,0), s1=getHSPairState(oi,1);
    if(s0.status==='filling'&&s0.msLeft!=null){if(nextMs===null||s0.msLeft<nextMs)nextMs=s0.msLeft;}
    if(s1.status==='filling'&&s1.msLeft!=null){if(nextMs===null||s1.msLeft<nextMs)nextMs=s1.msLeft;}
    let opStopMs=null;
    if(s0.status==='full'&&s1.status==='full'){opStopMs=0;}
    else if(s0.status==='full'&&s1.status==='filling'&&s1.msLeft!=null){opStopMs=s1.msLeft;}
    else if(s1.status==='full'&&s0.status==='filling'&&s0.msLeft!=null){opStopMs=s0.msLeft;}
    else if(s0.status==='filling'&&s1.status==='filling'){opStopMs=Math.max(s0.msLeft??0,s1.msLeft??0);}
    else if(s0.status==='filling'&&s0.msLeft!=null&&s1.status==='waiting'&&s1.tFull){opStopMs=s0.msLeft+s1.tFull;}
    else if(s1.status==='filling'&&s1.msLeft!=null&&s0.status==='waiting'&&s0.tFull){opStopMs=s1.msLeft+s0.tFull;}
    else if(s0.status==='filling'&&s0.msLeft!=null){opStopMs=s0.msLeft;}
    else if(s1.status==='filling'&&s1.msLeft!=null){opStopMs=s1.msLeft;}
    if(opStopMs!=null&&(stopMs===null||opStopMs<stopMs))stopMs=opStopMs;
  });
  return {stopMs,nextMs};
}
function calcL4StopMs() {
  if(!l4State.running&&!l4State.startMs) return {stopMs:null,nextMs:null};
  let stopMs=null, nextMs=null;
  L4_OPS.forEach((op,oi)=>{
    const rd=getL4RefData(oi);if(!rd)return;
    const s0=getL4SlotState(oi,0), s1=getL4SlotState(oi,1);
    if(s0.status==='filling'&&s0.msLeft!=null){if(nextMs===null||s0.msLeft<nextMs)nextMs=s0.msLeft;}
    if(s1.status==='filling'&&s1.msLeft!=null){if(nextMs===null||s1.msLeft<nextMs)nextMs=s1.msLeft;}
    let opStopMs=null;
    if(s0.status==='full'&&s1.status==='full'){opStopMs=0;}
    else if(s0.status==='full'&&s1.status==='filling'&&s1.msLeft!=null){opStopMs=s1.msLeft;}
    else if(s1.status==='full'&&s0.status==='filling'&&s0.msLeft!=null){opStopMs=s0.msLeft;}
    else if(s0.status==='filling'&&s0.msLeft!=null&&s1.status==='waiting'&&s1.tFull){opStopMs=s0.msLeft+s1.tFull;}
    else if(s1.status==='filling'&&s1.msLeft!=null&&s0.status==='waiting'&&s0.tFull){opStopMs=s1.msLeft+s0.tFull;}
    else if(s0.status==='filling'&&s0.msLeft!=null){opStopMs=s0.msLeft;}
    else if(s1.status==='filling'&&s1.msLeft!=null){opStopMs=s1.msLeft;}
    if(opStopMs!=null&&(stopMs===null||opStopMs<stopMs))stopMs=opStopMs;
  });
