// Pzs efectivo: manual (hslPzs) > DATA > 100 por defecto
function hslGetPzs(rd) {
  if(!rd) return 100;
  // Buscar la row que tiene esta ref activa para ver si tiene pzs manual
  const row = rows.find(r=>r.ref===rd.ref&&r.layoutActive&&r.hslPzs>0);
  if(row&&row.hslPzs) return row.hslPzs;
  return rd.pzs||100;
}

function getHSPairState(opIdx, pairIdx) {
  const s=hsState;
  const rd=getHSRefData(opIdx); // solo el op asignado, sin fallback
  if(!rd) return {pct:0,msLeft:null,status:'waiting'};
  const ct=getHSCT(rd);
  if(!ct) return {pct:0,msLeft:null,status:'waiting'};
  const pzs=hslGetPzs(rd);
  const pre=s.preloaded[opIdx][pairIdx]||0;
  const eff=Math.max(1,pzs-pre);
  const tFull=eff*ct*1000;
  const swMs=s.swapMs[opIdx][pairIdx];
  if(swMs===null) return {pct:Math.round(pre/pzs*100),msLeft:tFull,status:'waiting'};
  const opHere=s.opPhase[opIdx]===pairIdx;
  if(!opHere) {
    const le=s.lastFillEndMs[opIdx][pairIdx];
    if(le!==null&&swMs<=le) return {pct:100,msLeft:0,status:'full'};
    return {pct:Math.round(pre/pzs*100),msLeft:tFull,status:'waiting'};
  }
  const el=Math.max(0,getHSElapsed()-s.opFillStartMs[opIdx]);
  const pct=Math.min(100,Math.max(0,(pre+el/(ct*1000))/pzs*100));
  const msLeft=Math.max(0,tFull-el);
  const status=el>=tFull?'full':(s.running?'filling':(s.startMs?'paused':'waiting'));
  return {pct:Math.round(pct),msLeft,status,tFull};
}

// ── L4 slot state (same as L9 robot single-slot model) ──
function getL4SlotState(opIdx, slotIdx) {
  const s=l4State;
  const rd=getL4RefData(opIdx);
  if(!rd) return {pct:0,msLeft:null,status:'waiting'};
  const ct=getL4CT(rd);
  if(!ct) return {pct:0,msLeft:null,status:'waiting'};
  const pzs=hslGetPzs(rd);
  const pre=s.preloaded[opIdx][slotIdx]||0;
  const eff=Math.max(1,pzs-pre);
  const tFull=eff*ct*1000;
  const swMs=s.swapMs[opIdx][slotIdx];
  if(swMs===null) return {pct:Math.round(pre/pzs*100),msLeft:tFull,status:'waiting'};
  const opHere=s.opPhase[opIdx]===slotIdx;
  if(!opHere) {
    const le=s.lastFillEndMs[opIdx][slotIdx];
    if(le!==null&&swMs<=le) return {pct:100,msLeft:0,status:'full'};
    return {pct:Math.round(pre/pzs*100),msLeft:tFull,status:'waiting'};
  }
  const el=Math.max(0,getL4Elapsed()-s.opFillStartMs[opIdx]);
  const pct=Math.min(100,Math.max(0,(pre+el/(ct*1000))/pzs*100));
  const msLeft=Math.max(0,tFull-el);
  const status=el>=tFull?'full':(s.running?'filling':(s.startMs?'paused':'waiting'));
  return {pct:Math.round(pct),msLeft,status,tFull};
}

// ── Transitions ──
function checkHSTransitions() {
  const s=hsState;
  if(!s.running) return;
  const el=getHSElapsed();
  [0,1].forEach(oi=>{
    const rd=getHSRefData(oi); // solo el op asignado, sin fallback al op0
    if(!rd) return;
    const ct=getHSCT(rd);
    if(!ct) return;
    const cur=s.opPhase[oi];
    const pzs=hslGetPzs(rd);
    const pre=s.preloaded[oi][cur]||0;
    const tFull=Math.max(1,pzs-pre)*ct*1000;
    const fillEl=el-s.opFillStartMs[oi];
    if(fillEl<tFull) return;
    const endMs=s.opFillStartMs[oi]+tFull;
    s.lastFillEndMs[oi][cur]=endMs;
    const other=1-cur;
    const osw=s.swapMs[oi][other];
    const ole=s.lastFillEndMs[oi][other];
    const fresh=osw!==null&&(ole===null||osw>ole);
    if(!fresh){s.running=false;s.pauseMs=Date.now();return;}
    s.opPhase[oi]=other;
    s.opFillStartMs[oi]=Math.max(endMs,osw);
  });
}
function checkL4Transitions() {
  const s=l4State;
  if(!s.running) return;
  const el=getL4Elapsed();
  [0,1].forEach(oi=>{
    const rd=getL4RefData(oi);
    if(!rd) return;
    const ct=getL4CT(rd);
    if(!ct) return;
    const cur=s.opPhase[oi];
    const pzs=hslGetPzs(rd);
    const pre=s.preloaded[oi][cur]||0;
    const tFull=Math.max(1,pzs-pre)*ct*1000;
    const fillEl=el-s.opFillStartMs[oi];
    if(fillEl<tFull) return;
    const endMs=s.opFillStartMs[oi]+tFull;
    s.lastFillEndMs[oi][cur]=endMs;
    const other=1-cur;
    const osw=s.swapMs[oi][other];
    const ole=s.lastFillEndMs[oi][other];
    const fresh=osw!==null&&(ole===null||osw>ole);
    if(!fresh){s.running=false;s.pauseMs=Date.now();return;}
    s.opPhase[oi]=other;
    s.opFillStartMs[oi]=Math.max(endMs,osw);
  });
}

// ── Start/Stop toggles ──
function toggleHS() {
  const s=hsState;
  if(!s.startMs) {
    s.startMs=Date.now();s.totalPausedMs=0;s.pauseMs=null;s.running=true;
    s.swapMs=[[0,0],[0,0]];s.opPhase=[0,0];s.opFillStartMs=[0,0];
    s.lastFillEndMs=[[null,null],[null,null]];
  } else if(s.running) {
    s.running=false;s.pauseMs=Date.now();
  } else {
    s.totalPausedMs+=Date.now()-s.pauseMs;s.pauseMs=null;s.running=true;
  }
  if(!hsL4Timer) hsL4Timer=setInterval(()=>{checkHSTransitions();checkL4Transitions();renderHSL4Layout();},1000);
  renderHSL4Layout();
}
function toggleL4() {
  const s=l4State;
  if(!s.startMs) {
    s.startMs=Date.now();s.totalPausedMs=0;s.pauseMs=null;s.running=true;
    s.swapMs=[[0,0],[0,0]];s.opPhase=[0,0];s.opFillStartMs=[0,0];
    s.lastFillEndMs=[[null,null],[null,null]];
  } else if(s.running) {
    s.running=false;s.pauseMs=Date.now();
  } else {
    s.totalPausedMs+=Date.now()-s.pauseMs;s.pauseMs=null;s.running=true;
  }
  if(!hsL4Timer) hsL4Timer=setInterval(()=>{checkHSTransitions();checkL4Transitions();renderHSL4Layout();},1000);
  renderHSL4Layout();
}

// ── Swap / Retire actions ──
function swapHSPair(opIdx, pairIdx) {
  const s=hsState; const el=getHSElapsed();
  s.swapMs[opIdx][pairIdx]=el+1;
  s.lastFillEndMs[opIdx][pairIdx]=el;
  s.retiredCount+=1; // 1 palé por par por operario
  if(s.opPhase[opIdx]===pairIdx) {
    const other=1-pairIdx;
    const osw=s.swapMs[opIdx][other],ole=s.lastFillEndMs[opIdx][other];
    const fresh=(osw===null&&ole===null)||(osw!==null&&(ole===null||osw>ole));
    if(fresh){s.opPhase[opIdx]=other;s.opFillStartMs[opIdx]=osw!==null?Math.max(el+1,osw):el+1;}
    else s.opFillStartMs[opIdx]=el+1;
  }
  renderHSL4Layout();
}
function retireHSPair(opIdx, pairIdx) {
  const s=hsState; let rd=getHSRefData(opIdx); if(!rd)rd=getHSRefData(0);
  const st=getHSPairState(opIdx,pairIdx);
  s.incompleteCount++;
  s.incompletePzs+=rd?Math.round(st.pct/100*rd.pzs)*2:0;
  const el=getHSElapsed();
  s.swapMs[opIdx][pairIdx]=el+1;
  s.lastFillEndMs[opIdx][pairIdx]=el;
  if(s.opPhase[opIdx]===pairIdx) {
    const other=1-pairIdx;
    const osw=s.swapMs[opIdx][other], ole=s.lastFillEndMs[opIdx][other];
    if(osw!==null&&(ole===null||osw>ole)){s.opPhase[opIdx]=other;s.opFillStartMs[opIdx]=el;}
    else s.opFillStartMs[opIdx]=el+1;
  }
  renderHSL4Layout();
}
function swapL4Slot(opIdx, slotIdx) {
  const s=l4State; const el=getL4Elapsed();
  s.swapMs[opIdx][slotIdx]=el+1;
  s.lastFillEndMs[opIdx][slotIdx]=el;
  s.retiredCount++;
  if(s.opPhase[opIdx]===slotIdx) {
    const other=1-slotIdx;
    const osw=s.swapMs[opIdx][other],ole=s.lastFillEndMs[opIdx][other];
    const fresh=(osw===null&&ole===null)||(osw!==null&&(ole===null||osw>ole));
    if(fresh){s.opPhase[opIdx]=other;s.opFillStartMs[opIdx]=osw!==null?Math.max(el+1,osw):el+1;}
    else s.opFillStartMs[opIdx]=el+1;
  }
  renderHSL4Layout();
}
function retireL4Slot(opIdx, slotIdx) {
  const s=l4State; const rd=getL4RefData(opIdx);
  const st=getL4SlotState(opIdx,slotIdx);
  s.incompleteCount++;
  s.incompletePzs+=rd?Math.round(st.pct/100*rd.pzs):0;
  const el=getL4Elapsed();
  s.swapMs[opIdx][slotIdx]=el+1;
  s.lastFillEndMs[opIdx][slotIdx]=el;
  if(s.opPhase[opIdx]===slotIdx) {
    const other=1-slotIdx;
    const osw=s.swapMs[opIdx][other], ole=s.lastFillEndMs[opIdx][other];
    if(osw!==null&&(ole===null||osw>ole)){s.opPhase[opIdx]=other;s.opFillStartMs[opIdx]=el;}
    else s.opFillStartMs[opIdx]=el+1;
  }
  renderHSL4Layout();
}

function toggleL4CR(){if(!l4State.crActive&&!l4State.cr)return;snapshotL4Auto();if(!l4State.crActive){adjustL4SwapMs(getL4CT(getL4RefData(0)),l4State.cr);l4State.crActive=true;}else{adjustL4SwapMs(l4State.cr,getL4CT(getL4RefData(0)));l4State.crActive=false;}renderHSL4Layout();}
function adjustHSSwapMs(oldCT,newCT){if(!oldCT||!newCT||Math.abs(oldCT-newCT)<0.001)return;const el=getHSElapsed();[0,1].forEach(oi=>{const p=hsState.opPhase[oi];const pre=hsState.preloaded[oi][p]||0;const rd=getHSRefData(oi)||(getHSRefData(0));if(!rd)return;const eff=Math.max(1,rd.pzs-pre);const fe=el-hsState.opFillStartMs[oi];const frac=Math.min(1,Math.max(0,fe/(eff*oldCT*1000)));hsState.opFillStartMs[oi]=el-(frac*eff*newCT*1000);});}
function adjustL4SwapMs(oldCT,newCT){if(!oldCT||!newCT||Math.abs(oldCT-newCT)<0.001)return;const el=getL4Elapsed();[0,1].forEach(oi=>{const p=l4State.opPhase[oi];const pre=l4State.preloaded[oi][p]||0;const rd=getL4RefData(oi);if(!rd)return;const eff=Math.max(1,rd.pzs-pre);const fe=el-l4State.opFillStartMs[oi];const frac=Math.min(1,Math.max(0,fe/(eff*oldCT*1000)));l4State.opFillStartMs[oi]=el-(frac*eff*newCT*1000);});}

    // Refs del turno asignadas a este grupo (por sides o por hslGrupo)
    const assigned = allRefs.filter(r =>
      r.hslGrupo === prefix ||
      (r.sides||[]).some(s => s.startsWith(prefix))
    );
    const LINE_SIDES_DEF = prefix === 'HS'
      ? [['HSOP1','HS OP1'],['HSOP2','HS OP2']]
      : [['L4OP1','L4 OP1'],['L4OP2','L4 OP2']];

    // Select: todas las refs del DATA de este grupo, ordenadas numéricamente
    const sortedDataRefs = [...dataRefs].sort((a,b) => parseInt(a.ref)-parseInt(b.ref));
    const opts = `<option value="">+ añadir ref</option>`
      + sortedDataRefs.map(rd => {

    // Lista de refs asignadas
    const items = assigned.map(r => {

      const opBtns = LINE_SIDES_DEF.map(([val, lbl]) => {
        const act = activeSides.includes(val);
        const _sc = val==='HSOP1'?['#1a0d00','#fb923c','#f97316']
                  : val==='HSOP2'?['#1a0800','#fbbf24','#f59e0b']

        const [bg2,col2,brd2] = act ? _sc : ['var(--surface3)','var(--text3)','var(--border2)'];

      }).join('');
      const ct = rd.ct || 0;
      const pzsEff = r.hslPzs || rd.pzs || 0; // manual tiene prioridad
      const tMin = (ct && pzsEff) ? +(pzsEff * ct / 60).toFixed(1) : null;
      const posHtml = rd.pos ? `<span style="font-family:'Rajdhani',sans-serif;font-size:10px;background:#271000;color:#f97316;border:1px solid #c2410c;border-radius:4px;padding:1px 4px;white-space:nowrap">${rd.pos}</span>` : '';
      const pcaHtml = rd.pca && rd.pca!=='PCA' ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);background:var(--surface3);border:1px solid var(--border);border-radius:3px;padding:1px 4px">${rd.pca}</span>` : '';
      const tHtml = tMin ? `<span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--blue-text);white-space:nowrap">${tMin}'</span>` : '';
      const pzsInput = `<input type="number" min="1" placeholder="${rd.pzs||'pzs'}" value="${pzsEff||''}" inputmode="numeric"
        onchange="rows[${idx}].hslPzs=+this.value||0;hslStructHash='';renderHSL4Layout();renderHslRefPanel()"
        style="width:52px;background:var(--surface3);border:1.5px solid ${pzsEff?'var(--amber)':'var(--border)'};color:var(--amber-text);border-radius:5px;padding:2px 5px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;text-align:center;outline:none;min-height:26px" title="Piezas por palé">`;
      const bg = inLayout ? '#071a0f' : 'var(--surface2)';
      const bord = inLayout ? '1.5px solid var(--green)' : '1px solid var(--border2)';
      return `<div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:5px 8px;border-radius:6px;border:${bord};background:${bg};margin-top:3px">

      </div>`;
    }).join('');

    const activeCount = assigned.filter(r => r.layoutActive).length;

          ${opts}
        </select>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);margin-left:auto">${activeCount}/${assigned.length} activas</span>
      </div>
      <div style="padding:4px 8px">${items}</div>
    </div>`;
  }

// Añade una ref del DATA al listado del turno y la activa en el layout
function hslAddRef(refVal, prefix) {
  if(!refVal) return;
  const rd = getRef(refVal);
  if(!rd) return;
  // ¿Ya existe en rows con este grupo?
  let rowIdx = rows.findIndex(r => r.ref === refVal && r.hslGrupo === prefix);
  if(rowIdx < 0) {
    // Buscar slot vacío (ref === '')
    rowIdx = rows.findIndex(r => r.ref === '' || !r.ref);
    if(rowIdx < 0) return;
    rows[rowIdx].ref = refVal;
    rows[rowIdx].sides = [];
    rows[rowIdx].layoutActive = false;
    rows[rowIdx].hslGrupo = prefix; // marca de grupo
    rows[rowIdx].pales = '';
    updateRow(rowIdx);
  }
  hslStructHash = ''; // fuerza rebuild para mostrar ref añadida en selector L4
  renderHSL4Layout();
  renderHslRefPanel();
  renderLayoutRefList();
}
// Asigna/desasigna operario — permite tener OP1 y OP2 a la vez (misma pieza para ambos)
function hslAssignOp(rowIdx, sideVal) {
  const r=rows[rowIdx]; if(!r) return;
  const sides=r.sides||[];
  if(sides.includes(sideVal)) {
    // Quitar este operario
    rows[rowIdx].sides=sides.filter(s=>s!==sideVal);
    // Si no quedan operarios, desactivar del layout
    const prefix=sideVal.startsWith('HS')?'HS':'L4';
    if(!rows[rowIdx].sides.some(s=>s.startsWith(prefix))) {
      rows[rowIdx].layoutActive=false;
    }
  } else {
    // Añadir este operario (sin quitar los otros)
    rows[rowIdx].sides=[...sides, sideVal];
    setLayoutActive(rowIdx, true);
  }
  updateLayoutActiveBtns(rowIdx);
  hslStructHash=''; renderHSL4Layout(); renderHslRefPanel(); renderHslL4Panel();
}
// Elimina una ref del listado
function hslRemoveRef(rowIdx) {
  rows[rowIdx].ref='';
  rows[rowIdx].sides=[];
  rows[rowIdx].layoutActive=false;
  rows[rowIdx].hslGrupo=null;
  rows[rowIdx].pales='';
  updateRow(rowIdx);
  updateLayoutActiveBtns(rowIdx);
  hslStructHash=''; renderHSL4Layout(); renderHslRefPanel(); renderHslL4Panel(); renderLayoutRefList();
}

  // Update NEC/÷2 in HS section header
  const _rd0hs=getHSRefData(0)||getHSRefData(1);
  const _pzsHS=_rd0hs?_rd0hs.pzs:0;
  if(_pzsHS>0){
    const _liveH=getLiveActualesHS(),_pndH=hsState.calcDemanda>0?Math.max(0,hsState.calcDemanda-_liveH):null;
    const _nH=_pndH!=null?(_pndH/_pzsHS).toFixed(1):'—', _hH=_pndH!=null?(_pndH/_pzsHS/2).toFixed(1):'—';

  if(_pzsL4>0){
    const _liveL4=getLiveActualesL4(),_pndL4=l4State.calcDemanda>0?Math.max(0,l4State.calcDemanda-_liveL4):null;
    const _nL=_pndL4!=null?(_pndL4/_pzsL4/_nOpsL4).toFixed(1):'—', _hL=_pndL4!=null?(_pndL4/_pzsL4/_nOpsL4/2).toFixed(1):'—';

  updateAlmacenPanelHSL('hs', hsState, getLiveActualesHS, getHSRefData);
  updateAlmacenPanelHSL('l4', l4State, getLiveActualesL4, getL4RefData);
}

// ── PANEL INCOMPLETO ALMACÉN (HS·L4) ────────────────────────────────────────
// En HS y L4: el incompleto es 1 palé compartido entre las 2 refs (parejas izq+der)
// almacenPzs = piezas que ya tiene el palé incompleto (igual para ambas refs)
function calcAlmacenRecHSL(sObj, getActFn, getRefFn) {
  const almacenPzs = sObj.almacenPzs || 0;
  if (!almacenPzs || almacenPzs <= 0) return null;
  const rd = getRefFn(0) || getRefFn(1);
  if (!rd) return null;
  const pzs = hslGetPzs(rd);
  if (!pzs) return null;
  const liveAct = getActFn();
  const pzsPend = sObj.calcDemanda > 0 ? Math.max(0, sObj.calcDemanda - liveAct) : 0;
  if (!pzsPend) return null;

  const pzsFaltanRobot = Math.max(0, pzs - almacenPzs);
  const sobrante = pzsPend % pzs;

  // AHORA: robot completa el incompleto (+pzsFaltanRobot), luego hace palés con pzsPend restantes
  const sobranteAhora = pzsPend % pzs;
  const incAhora = sobranteAhora > 0 ? 1 : 0;

  // ÚLTIMO: primero palés completos con pzsPend, el incompleto remata el sobrante
  const incUlt = sobrante === 0 ? 0 : ((almacenPzs + sobrante >= pzs) ? 0 : 1);

  let rec, detalle;
  if (almacenPzs >= pzs) {
    rec = 'NO USAR'; detalle = `${almacenPzs}≥${pzs} pzs/palé`;
  } else if (incUlt <= incAhora) {
    rec = 'ÚLTIMO';
    detalle = `+${pzsFaltanRobot}p → ${incUlt===0?'0 inc ✓':incUlt+' inc'}`;
  } else {
    rec = 'AHORA';
    detalle = `+${pzsFaltanRobot}p → ${incAhora===0?'0 inc ✓':incAhora+' inc'}`;
  }
  return { rec, incAhora, incUlt, detalle, sobrante, almacenPzs, pzs, pzsPend };
}

function setHSAlmacenPzs(val) {
  hsState.almacenPzs = Math.max(0, val || 0);
  updateHSLValuesOnly();
}
function setL4AlmacenPzs(val) {
  l4State.almacenPzs = Math.max(0, val || 0);
  updateHSLValuesOnly();
}

function buildAlmacenPanelHSL(pfx, sObj, getActFn, getRefFn, setFn) {
  const almacenPzs = sObj.almacenPzs || 0;
  const rd = getRefFn(0) || getRefFn(1);
  const pzs = rd ? hslGetPzs(rd) : 0;
  const info = calcAlmacenRecHSL(sObj, getActFn, getRefFn);

  const recColor = !info ? 'var(--text3)' :
    info.rec === 'AHORA' ? 'var(--green-text)' :
    info.rec === 'ÚLTIMO' ? 'var(--amber-text)' : 'var(--red)';
  const recBg = !info ? 'var(--surface3)' :
    info.rec === 'AHORA' ? 'var(--green-bg)' :
    info.rec === 'ÚLTIMO' ? 'var(--amber-bg)' : 'var(--red-bg)';
  const recBorder = !info ? 'var(--border2)' :
    info.rec === 'AHORA' ? 'var(--green)' :
    info.rec === 'ÚLTIMO' ? 'var(--amber)' : 'var(--red)';

  return `<div id="hsl-almacen-${pfx}" style="display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:5px 6px;min-width:62px;flex-shrink:0;align-self:flex-start">
    <div style="font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap">🏭 ALMACÉN</div>
    <input id="hsl-almacen-inp-${pfx}" type="number" min="0" max="${pzs||999}" inputmode="numeric"
      value="${almacenPzs||''}" placeholder="0"
      onchange="event.stopPropagation();${setFn}(+this.value)"
      style="width:52px;min-height:28px;background:var(--surface3);border:1.5px solid ${almacenPzs>0?'var(--amber)':'var(--border2)'};color:${almacenPzs>0?'var(--amber-text)':'var(--text2)'};padding:2px 4px;border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;text-align:center;outline:none">
    <div style="font-family:'Rajdhani',sans-serif;font-size:8px;color:var(--text3);white-space:nowrap">${pzs?'/ '+pzs+' pzs':''}</div>
    ${info ? `<div style="background:${recBg};border:1px solid ${recBorder};border-radius:4px;padding:2px 5px;text-align:center">
      <div style="font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:${recColor};white-space:nowrap">${info.rec}</div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:${recColor};white-space:nowrap;opacity:.85">${info.detalle}</div>
    </div>` : ''}
  </div>`;
}

function updateAlmacenPanelHSL(pfx, sObj, getActFn, getRefFn) {
  const almacenPzs = sObj.almacenPzs || 0;
  const rd = getRefFn(0) || getRefFn(1);
  const pzs = rd ? hslGetPzs(rd) : 0;

  const inpEl = document.getElementById(`hsl-almacen-inp-${pfx}`);
  if (inpEl && document.activeElement !== inpEl) {
    inpEl.value = almacenPzs || '';
    inpEl.style.borderColor = almacenPzs > 0 ? 'var(--amber)' : 'var(--border2)';
    inpEl.style.color = almacenPzs > 0 ? 'var(--amber-text)' : 'var(--text2)';
    inpEl.max = pzs || 999;
  }

  const panelEl = document.getElementById(`hsl-almacen-${pfx}`);
  if (!panelEl) return;

  const info = calcAlmacenRecHSL(sObj, getActFn, getRefFn);
  const recColor = !info ? 'var(--text3)' :
    info.rec === 'AHORA' ? 'var(--green-text)' :
    info.rec === 'ÚLTIMO' ? 'var(--amber-text)' : 'var(--red)';
  const recBg = !info ? 'var(--surface3)' :
    info.rec === 'AHORA' ? 'var(--green-bg)' :
    info.rec === 'ÚLTIMO' ? 'var(--amber-bg)' : 'var(--red-bg)';
  const recBorder = !info ? 'var(--border2)' :
    info.rec === 'AHORA' ? 'var(--green)' :
    info.rec === 'ÚLTIMO' ? 'var(--amber)' : 'var(--red)';
  const newRec = info
    ? `<div style="background:${recBg};border:1px solid ${recBorder};border-radius:4px;padding:2px 5px;text-align:center"><div style="font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;color:${recColor};white-space:nowrap">${info.rec}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:${recColor};white-space:nowrap;opacity:.85">${info.detalle}</div></div>`
    : '';

  const children = panelEl.children;
  const lastChild = children[children.length - 1];
  const isRecBlock = lastChild && lastChild.style && lastChild.style.textAlign === 'center';
  if (newRec) {
    const tmp = document.createElement('div');
    tmp.innerHTML = newRec;
    const newEl = tmp.firstChild;
    if (isRecBlock) panelEl.replaceChild(newEl, lastChild);
    else panelEl.appendChild(newEl);
  } else if (isRecBlock) {
    panelEl.removeChild(lastChild);
  }
}

function openSeguimiento(idx) {

function renderLayoutCalc() {
  if(isUserTypingInLayout()) return;
  const el = document.getElementById('layout-calc');
  if (!el) return;
  const ct_fn = (rd) => (globalCRActive && globalCR) ? globalCR : (rd ? rd.ct : 0);
  const liveAct = getLiveActuales();

  const refs = [];
  ['C1','C2'].forEach(side => {
    const rowRef = rows.find(r => r.layoutActive && (r.sides||[]).includes(side));
    const rd = rowRef ? getRef(rowRef.ref) : null;
    if (!rd) return;
    const ct = ct_fn(rd), pzs = rd.pzs || 0;
    const tMinPale = (ct && pzs) ? +(pzs * ct / 60).toFixed(2) : 0;
    const sameRefBothSides = refs.length > 0 && refs[0].rowRef.ref === rowRef.ref;
    const numSides = sameRefBothSides ? 2 : 1;
    const demandaPerSide = (sameRefBothSides && numSides > 1) ? layoutCalcDemanda / numSides : layoutCalcDemanda;
    const liveActPerSide = (sameRefBothSides && numSides > 1) ? liveAct / numSides : liveAct;
    const pzsPend = demandaPerSide > 0 ? Math.max(0, demandaPerSide - liveActPerSide) : 0;
    const palesPend = (pzsPend > 0 && pzs > 0) ? Math.ceil(pzsPend / pzs) : 0;
    const tTotalMin = (tMinPale && palesPend) ? tMinPale * palesPend : 0;
    refs.push({ side, rowRef, rd, ct, pzs, tMinPale, pzsPend, palesPend, tTotalMin,
                sideCol: side==='C1' ? 'var(--amber-text)' : '#79c0ff' });
  });

  // ── Update in-place if structure already rendered ──────────────────────
  const liveEl = document.getElementById('calc-liveact');
  if (liveEl) {
    liveEl.textContent = liveAct > layoutCalcActuales ? `+${liveAct-layoutCalcActuales} en línea → ${liveAct}` : '';
    refs.forEach(r => {
      const pe = document.getElementById(`calc-pend-${r.side}`); if(pe) pe.textContent = r.pzsPend;
      const pal = document.getElementById(`calc-pale-${r.side}`); if(pal) pal.style.display = r.palesPend>0?'':'none';
      const palV = document.getElementById(`calc-paleval-${r.side}`); if(palV) palV.textContent = r.palesPend||'—';
      const tt = document.getElementById(`calc-ttot-${r.side}`);
      if(tt) { const h=Math.floor(r.tTotalMin/60), m=Math.round(r.tTotalMin%60); tt.textContent = r.tTotalMin?(h>0?h+"h "+m+"'":m+"'"):'—'; }
    });
    const maxT = refs.reduce((m,r)=>Math.max(m,r.tTotalMin),0);
    const maxP = refs.reduce((s,r)=>s+r.palesPend,0);
    const sumH = Math.floor(maxT/60), sumM = Math.round(maxT%60);
    const totTime = document.getElementById('calc-tot-time'); if(totTime) totTime.textContent = maxT?(sumH>0?sumH+"h "+sumM+"'":sumM+"'"):'—';
    const totPales = document.getElementById('calc-tot-pales'); if(totPales) totPales.textContent = maxP||'—';
    const summaryEl = document.getElementById('calc-summary'); if(summaryEl) summaryEl.style.display = maxT>0?'':'none';
    return;
  }

  if (!refs.length) {
    el.innerHTML = '<div style="font-family:Rajdhani,sans-serif;font-size:12px;color:var(--text3)">Activa referencias en el layout para usar la calculadora</div>';
    return;
  }

  const maxTotalMin = refs.reduce((m, r) => Math.max(m, r.tTotalMin), 0);
  const maxPalesPend = refs.reduce((s, r) => s + r.palesPend, 0);
  const hrs = Math.floor(maxTotalMin / 60), mins = Math.round(maxTotalMin % 60);

  let html = `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
    <span style="font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--text2);white-space:nowrap">Demanda:</span>
    <input type="number" min="0" placeholder="piezas" value="${layoutCalcDemanda||''}" inputmode="numeric"
      onchange="layoutCalcDemanda=+this.value;updateLayoutStats()"
      style="width:80px;background:var(--surface3);border:1.5px solid var(--amber);color:var(--amber-text);padding:4px 7px;border-radius:5px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;text-align:center;outline:none;min-height:34px">
    <span style="font-family:'Rajdhani',sans-serif;font-size:11px;color:var(--text2);white-space:nowrap">Actuales:</span>
    <input type="number" min="0" placeholder="0" value="${layoutCalcActuales||''}" inputmode="numeric"
      onchange="layoutCalcActuales=+this.value;layoutCalcAutoProduced=0;layoutCalcAutoRefElapsedMs=getMaxLayoutElapsed();updateLayoutStats()"
      style="width:80px;background:var(--surface3);border:1.5px solid var(--border2);color:var(--text);padding:4px 7px;border-radius:5px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;text-align:center;outline:none;min-height:34px">
    <span id="calc-liveact" style="font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--green-text)">${liveAct>layoutCalcActuales?`+${liveAct-layoutCalcActuales} en línea → ${liveAct}`:''}</span>
  </div>`;

  html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">`;
  refs.forEach(({side, rowRef, rd, ct, pzs, tMinPale, pzsPend, palesPend, tTotalMin, sideCol}) => {
    const hh = Math.floor(tTotalMin/60), mm = Math.round(tTotalMin%60);
    html += `<div style="flex:1;min-width:140px;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:8px">
      <div style="font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:${sideCol};margin-bottom:5px">${side} · ${rowRef.ref} — ${rd.nombre+(rd.fr?" · "+rd.fr:"")}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div><div style="font-family:'Rajdhani',sans-serif;font-size:9px;color:var(--text3);text-transform:uppercase">Pzs/palé</div><div style="font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--text);font-weight:700">${pzs}</div></div>
        <div><div style="font-family:'Rajdhani',sans-serif;font-size:9px;color:var(--text3);text-transform:uppercase">CT${globalCRActive?'/CR':''}</div><div style="font-family:'IBM Plex Mono',monospace;font-size:15px;color:${globalCRActive?'var(--green-text)':'var(--text)'};">${ct?ct+'s':'—'}</div></div>
        <div><div style="font-family:'Rajdhani',sans-serif;font-size:9px;color:var(--text3);text-transform:uppercase">T/palé</div><div style="font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--blue-text);">${tMinPale?fmtMinSec(tMinPale):'—'}</div></div>
        <div><div style="font-family:'Rajdhani',sans-serif;font-size:9px;color:var(--text3);text-transform:uppercase">Pzs pend</div><div id="calc-pend-${side}" style="font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--amber-text);font-weight:700">${pzsPend}</div></div>
        <div id="calc-pale-${side}" style="${palesPend>0?'':'display:none'}"><div style="font-family:'Rajdhani',sans-serif;font-size:9px;color:var(--text3);text-transform:uppercase">Palés nec</div><div id="calc-paleval-${side}" style="font-family:'IBM Plex Mono',monospace;font-size:20px;color:var(--amber-text);font-weight:700">${palesPend||'—'}</div></div>
        <div><div style="font-family:'Rajdhani',sans-serif;font-size:9px;color:var(--text3);text-transform:uppercase">T total</div><div id="calc-ttot-${side}" style="font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--text)">${tTotalMin?(hh>0?hh+"h "+mm+"'":mm+"'"):'—'}</div></div>
      </div>
    </div>`;
  });
  html += `</div>`;

  html += `<div id="calc-summary" style="display:${maxTotalMin>0?'flex':'none'};gap:12px;align-items:center;flex-wrap:wrap;background:var(--navy);border:1px solid #1e4070;border-radius:6px;padding:8px 12px">
    <div><div style="font-family:'Rajdhani',sans-serif;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px">⏱ Tiempo hasta fin</div>
      <div id="calc-tot-time" style="font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;color:var(--blue-text);line-height:1.1">${maxTotalMin?(hrs>0?hrs+"h "+mins+"'":mins+"'"):'—'}</div></div>
    <div><div style="font-family:'Rajdhani',sans-serif;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px">Palés totales</div>
      <div id="calc-tot-pales" style="font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:700;color:var(--amber-text);line-height:1.1">${maxPalesPend||'—'}</div></div>
    ${refs.filter(r=>r.palesPend>0).map(r=>`<div><div style="font-family:'Rajdhani',sans-serif;font-size:10px;color:${r.sideCol};text-transform:uppercase;letter-spacing:.3px">${r.side} palés</div><div style="font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;color:${r.sideCol}">${r.palesPend}</div></div>`).join('')}
  </div>`;

  el.innerHTML = html;
}

function setLayoutActive(i, active) {
  rows[i].layoutActive = active;
  if (active && currentLine !== 'linea4hs') {
    // L9/L8: enforce one active per side
    const mySides = rows[i].sides || [];
    rows.forEach((r, j) => {
      if (j !== i && r.layoutActive) {
        const otherSides = r.sides || [];
        if (mySides.some(s => otherSides.includes(s))) {
          rows[j].layoutActive = false;
          updateLayoutActiveBtns(j);
        }
      }
    });
  }
  // linea4hs: allow up to 2 active per sub-line (HS or L4)
  if (active && currentLine === 'linea4hs') {
    const mySides = rows[i].sides || [];
    const mySides2 = rows[i].sides || [];
    mySides2.forEach(s => {
      const activeSameSide = rows.filter((r,j) => j!==i && r.layoutActive && (r.sides||[]).includes(s));
      const limit = s==='HS' ? 2 : 1; // HS allows 2 (izq+der), L4OP1/L4OP2 allow 1 each
      if (activeSameSide.length >= limit) {
        const oldest = activeSameSide[0];
        const oj = rows.indexOf(oldest);
        rows[oj].layoutActive = false;
        updateLayoutActiveBtns(oj);
      }
    });
  }
  updateLayoutActiveBtns(i);
  layoutStructureHash = ''; // force full rebuild so current sides/robots are picked up
  // Al activar una ref en L9/L8: resetear CR al CT de la nueva pieza
  if (active && (currentLine === 'linea9' || currentLine === 'linea8')) {
    const newRd = getRef(rows[i].ref);
    const newCT = newRd ? newRd.ct : 0;
    if (newCT) {
      snapshotAutoProduced();
      if (globalCRActive) {
        // Ajustar timers al CT base antes de desactivar CR
        ['C1','C2'].forEach(side => adjustSwapMsForRateChange(globalCR, newCT));
      }
      globalCR = newCT;
      globalCRInput = newCT; // input también al CT base
      globalCRActive = false; // siempre desactivar CR al cambiar ref
    }
  }
  renderLineaLayout();
}

function addSwipe(inp){
  const step=parseFloat(inp.dataset.step)||1;
  const dec=parseInt(inp.dataset.decimals)||0;
  const sens=dec>0?18:10;
  let y0=null,v0=0,last=0;
  inp.addEventListener('touchstart',e=>{
    y0=e.touches[0].clientY;
    v0=parseFloat(inp.value)||0;
    last=v0;
  },{passive:true});
  inp.addEventListener('touchmove',e=>{
    if(y0===null)return;
    e.preventDefault();
    const dy=y0-e.touches[0].clientY;
    const steps=Math.round(dy/sens);
    let nv=Math.max(0,parseFloat((v0+steps*step).toFixed(dec)));
    if(nv!==last){
      last=nv;
      inp.value=dec>0?nv.toFixed(dec):nv;
      inp.classList.add('swipe-flash');
      setTimeout(()=>inp.classList.remove('swipe-flash'),160);
      inp.dispatchEvent(new Event('input'));
    }
  },{passive:false});
  inp.addEventListener('touchend',()=>{y0=null;});
}
document.querySelectorAll('.swipe-num').forEach(addSwipe);const swipeObs=new MutationObserver(()=>{

  });
});

document.getElementById('load-confirm')?.addEventListener('click',()=>{
  const text=document.getElementById('load-text').value;
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const refs=DATA[currentLine]||[];
  let loaded=0,updated=0,notFound=[];

  for(const line of lines){
    const parts = line.split(':').map(s => s.trim());
    const ref = parts[0], pales = parts[1] || '', ptgpales = parts[2] || '';
    const found=refs.find(r=>r.ref===ref.padStart(3,'0'));
    if(!found){ notFound.push(ref); continue; }

    // If ref already in a row → update pales only (don't reset config)
    const existingIdx=rows.findIndex(r=>r.ref===found.ref);
    if(existingIdx>=0){
      if(pales){ rows[existingIdx].pales=pales; updated++; }
      if(ptgpales){ rows[existingIdx].ptgpales=ptgpales; }
      rows[existingIdx].l9Panel = true;
      continue;
    }

    // Find first empty slot
    const emptyIdx=rows.findIndex(r=>!r.ref);
    if(emptyIdx<0){ notFound.push(ref+' (sin hueco)'); continue; }

    rows[emptyIdx]={ref:found.ref,pales:pales||'',demanda:'',actuales:'',ptgpales:ptgpales||'',
      sides:[],layoutActive:false,selectedRobots:[],numSlots:2,slotStates:[],swappedCount:0,
      l9Panel:true};
    loaded++;
  }

  const msg=`✓ ${loaded} añadidas${updated?' · '+updated+' actualizadas':''}${notFound.length?' · No encontradas: '+notFound.join(', '):''}`;
  document.getElementById('load-feedback').textContent=msg;
  setTimeout(()=>{
    document.getElementById('load-modal').style.display='none';
    document.getElementById('load-text').value='';
    document.getElementById('load-feedback').textContent='';
    renderTurno();
    if(currentLine==='linea9'||currentLine==='linea8') renderL9RefPanel();
    for(let i=0;i<NUM_ROWS;i++){
      const card=document.getElementById('card-'+i);
      if(!card) continue;
      const sel=card.querySelector('.ref-select');
      if(sel&&rows[i].ref) sel.value=rows[i].ref;
      const pinp=card.querySelector('.pales-input');
      if(pinp&&rows[i].pales) pinp.value=rows[i].pales;
      updateRow(i);
    }
  },800);
});
document.getElementById('export-btn').addEventListener('click',()=>{
  let out='TURNO '+document.getElementById('meta-turno').value+' — '+document.getElementById('meta-fecha').value+'\n';
  out+='Línea: '+(document.querySelector('.line-btn.active')||{textContent:''}).textContent+'\n\n';
  out+='REF\tNOMBRE\tPOS\tPALÉS\tT(min)\n';
  for(let i=0;i<NUM_ROWS;i++){
    if(!rows[i].ref) continue;
    const d=getRef(rows[i].ref);
    if(!d) continue;
    const t=calcTmin(d.pzs,d.ct);
    out+=`${rows[i].ref}\t${d.nombre}\t${d.pos}\t${rows[i].pales||0}\t${t||''}\n`;
  }
  const blob=new Blob([out],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='turno_'+document.getElementById('meta-turno').value+'.txt';
  a.click();
});
